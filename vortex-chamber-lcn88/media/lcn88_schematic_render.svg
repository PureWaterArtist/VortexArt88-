<svg xmlns="http://w3.org" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background Shield Grid -->
  <rect width="800" height="500" fill="#0b0f19" />
  <g stroke="#1e293b" stroke-width="1" opacity="0.3">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" />
  </g>

  <!-- LCN-88 Outer Casing Outline -->
  <path d="M 220,120 L 580,120 A 130,130 0 0,1 580,380 L 220,380 A 130,130 0 0,1 220,120 Z" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="2,2" opacity="0.8" />

  <!-- Dual Fluidic Overlapping Roller Chambers (Lemniscate Geometry) -->
  <circle cx="315" cy="250" r="110" fill="#0f172a" stroke="#0284c7" stroke-width="3" />
  <circle cx="485" cy="250" r="110" fill="#0f172a" stroke="#0284c7" stroke-width="3" />

  <!-- Vector Input Arrow Lines -->
  <!-- Left Side: Nozzle B (Clockwise Fluid Input) -->
  <path d="M 80,140 L 220,140" fill="none" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)" />
  <!-- Right Side: Nozzle A (Counter-Clockwise Fluid Input) -->
  <path d="M 720,360 L 580,360" fill="none" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Internal Spiral Fluidic Vectors -->
  <path d="M 220,140 A 110,110 0 0,1 315,360 A 110,110 0 0,1 400,250" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="5,5" />
  <path d="M 580,360 A 110,110 0 0,1 485,140 A 110,110 0 0,1 400,250" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" />

  <!-- Center Collision Zero-Momentum Singularity Core -->
  <circle cx="400" cy="250" r="16" fill="#10b981" opacity="0.4" />
  <circle cx="400" cy="250" r="6" fill="#34d399" />

  <!-- Axis Crosshair Labels -->
  <line x1="400" y1="50" x2="400" y2="450" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="50" y1="250" x2="750" y2="250" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Text Annotations -->
  <text x="400" y="40" fill="#34d399" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Z-AXIS ATMOSPHERIC VACUUM PORT (0, 0, 1)</text>
  <text x="80" y="120" fill="#f43f5e" font-family="monospace" font-size="13" font-weight="bold">NOZZLE B INLET (-1, 0, 0)</text>
  <text x="720" y="390" fill="#3b82f6" font-family="monospace" font-size="13" text-anchor="end" font-weight="bold">NOZZLE A INLET (1, 0, 0)</text>
  <text x="400" y="285" fill="#34d399" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">180° VECTOR CANCELLATION ORIGIN (0,0,0)</text>
  <text x="400" y="475" fill="#94a3b8" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Z-AXIS DRAINAGE DISCHARGE (0, 0, -1)</text>

  <!-- SVG Arrow Marker Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e2e8f0" />
    </marker>
  </defs>
</svg>
