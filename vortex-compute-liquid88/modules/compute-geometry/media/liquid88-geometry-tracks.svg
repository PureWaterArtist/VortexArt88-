<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Micro-Fluidic Channel Grid Base -->
  <rect width="800" height="600" fill="#010305" />
  <g stroke="#050a16" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- MICRO-FLUIDIC LOGIC GATE LAYER HOUSING (50mm x 60mm envelope card scaled) -->
  <rect x="150" y="80" width="500" height="440" fill="none" stroke="#334155" stroke-width="3" rx="6" />
  <text x="165" y="105" fill="#475569" font-family="monospace" font-size="11" font-weight="bold">SUBSTRATE ENVELOPE: 50.0mm x 60.0mm</text>

  <!-- MICRO-FLUIDIC CHANNELS AND ROUTING PATHS MATRIX -->
  <!-- Main Input Feeds (Inputs A, Clock, B) -->
  <g fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round">
    <!-- Input A Path -->
    <path d="M 250,140 L 250,220" />
    <!-- Master Clock Sync Rail Path -->
    <path d="M 400,140 L 400,260" stroke="#00f2ff" stroke-width="3.5" />
    <!-- Input B Path -->
    <path d="M 550,140 L 550,220" />
  </g>

  <!-- Symmetrical Bistable Coandă Wall-Adhesion Y-Splitters -->
  <g fill="none" stroke="#a855f7" stroke-width="3" stroke-linejoin="round">
    <!-- Left Splitter Loop -->
    <path d="M 250,220 L 300,280 L 300,340" />
    <path d="M 250,220 L 200,280 L 200,420" />
    <!-- Right Splitter Loop -->
    <path d="M 550,220 L 500,280 L 500,340" />
    <path d="M 550,220 L 600,280 L 600,420" />
  </g>

  <!-- Central Interaction Loop Core & 0.8mm Overclock Choke Rings -->
  <g fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
    <!-- Left Junction Entry to Center -->
    <path d="M 300,340 Q 400,360 400,380" />
    <!-- Right Junction Entry to Center -->
    <path d="M 500,340 Q 400,360 400,380" />
    <!-- Micro-Vortex Overclock Ring Chamber -->
    <circle cx="400" cy="380" r="14" stroke="#00f2ff" stroke-width="2.5" />
    <!-- Primary AND Gate Decision Output Channel -->
    <path d="M 400,394 L 400,480" stroke="#34d399" stroke-width="3" />
  </g>

  <!-- Secondary XOR Branch Logic Output Channels -->
  <g fill="none" stroke="#a855f7" stroke-width="3">
    <path d="M 200,420 L 250,480" />
    <path d="M 600,420 L 550,480" />
  </g>

  <!-- Cartesian Node Coordinate Verification Markers -->
  <g fill="#00f2ff">
    <circle cx="250" cy="140" r="5" />
    <circle cx="400" cy="140" r="5" />
    <circle cx="550" cy="140" r="5" />
    <circle cx="300" cy="280" r="5" fill="#f59e0b" />
    <circle cx="400" cy="380" r="5" fill="#ef4444" />
    <circle cx="400" cy="480" r="5" fill="#34d399" />
  </g>

  <!-- DIAGRAM RE-ALIGNMENT DETAILS & ANGLE MARKS LABELS -->
  <text x="250" y="125" fill="#00f2ff" font-family="monospace" font-size="9" text-anchor="middle">Gate_In_A (12.50, 8.25)</text>
  <text x="400" y="125" fill="#00f2ff" font-family="monospace" font-size="9" text-anchor="middle">Gate_In_Clock (25.00, 8.25)</text>
  <text x="550" y="125" fill="#00f2ff" font-family="monospace" font-size="9" text-anchor="middle">Gate_In_B (37.50, 8.25)</text>
  
  <text x="315" y="285" fill="#f59e0b" font-family="monospace" font-size="9">Junction_Y1</text>
  <text x="420" y="384" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">Choke_Vortex1 (0.8mm Ring)</text>
  <text x="400" y="500" fill="#34d399" font-family="monospace" font-size="9" text-anchor="middle">Gate_Out_AND (18.75, 52.00)</text>

  <text x="285" y="240" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">θ = 30.0°</text>
  <text x="400" y="335" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">INTERACTION LOOP CAVITY</text>

  <text x="400" y="545" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">Nominal Channel Carve Depth: 2.20mm // Surface Finish Target: Ra 0.05μm</text>
  <text x="400" y="560" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Overclock Trace Bounds: 0.80mm Width // Standard Fluidic Logic Tracks: 1.50mm</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT LIQUID-RESONANCE-v88 // MODULE COMPUTE-GEOMETRY BLUEPRINT v1.0.0</text>
</svg>
    
