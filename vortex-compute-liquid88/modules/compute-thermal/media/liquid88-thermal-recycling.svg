<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Thermal Staging Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#040916" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- THERMAL GRADIENT BOUNDARIES CROSS SECTION -->
  <!-- Cool Outer Case Wall Boundary -->
  <rect x="100" y="460" width="600" height="30" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="400" y="480" fill="#64748b" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">COOL OUTER BLOCK WALL (22.0°C BASELINE)</text>

  <!-- BISMUTH-TELLURIDE (Bi2Te3) THIN-FILM THERMOPILE LAYER (250 Microns) -->
  <g fill="#1e293b" stroke="#38bdf8" stroke-width="1.5">
    <!-- Alternating P-N Thermocouple Junction Array Strips -->
    <rect x="150" y="380" width="500" height="40" rx="1" />
    <path d="M 190,380 V 420 M 230,380 V 420 M 270,380 V 420 M 310,380 V 420 M 350,380 V 420 M 390,380 V 420 M 430,380 V 420 M 470,380 V 420 M 510,380 V 420 M 550,380 V 420 M 590,380 V 420 M 630,380 V 420" stroke-dasharray="3,1" />
  </g>

  <!-- HOT ACTIVE MICRO-FLUIDIC DECISION CHANNEL (Joule Heat Output Zone) -->
  <!-- Transverse section showing hot moving EGaIn liquid line -->
  <path d="M 150,260 L 650,260 L 610,340 L 190,340 Z" fill="#7f1d1d" stroke="#ef4444" stroke-width="2.5" />
  <circle cx="400" cy="300" r="16" fill="#ef4444" opacity="0.3" />
  <circle cx="400" cy="300" r="8" fill="#fca5a5" />

  <!-- THERMOELECTRIC ENERGY RECOVERY SEEBECK VOLTAGE LOOPS -->
  <!-- Recovered voltage feeding back into primary power bus -->
  <path d="M 400,380 Q 400,200 400,160" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-green)" />
  <path d="M 330,400 L 270,400" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-cyan)" />
  <path d="M 470,400 L 530,400" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-cyan)" />

  <!-- RE-ALIGNMENT DIAGRAM DATA SHEET LABELS -->
  <text x="400" y="315" fill="#fca5a5" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ACTIVE CHANNELS JOULE HEATING (I²R)</text>
  <text x="400" y="405" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">Bi₂Te₃ p-n THERMOCOUPLE JUNCTIONS (250μm)</text>
  
  <text x="400" y="125" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">SEEBECK CLOSED-LOOP VOLTAGE RECOVERY: +344.0 mV</text>
  <text x="400" y="145" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">THERMAL GRADIENT RECYCLING RATIO η: ≥ 6.5%</text>
  
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Maximum Allowable Safe Core Operating Heat Ceiling: 65.0°C // Seebeck Coefficient: 200 μV/K</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Polymer Substrate Conductivity: 0.25 W/m·K // EGaIn Liquid Conductivity Matrix: 26.6 W/m·K</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT LIQUID-RESONANCE-v88 // MODULE COMPUTE-THERMAL SEEBECK RECOVERY v1.0.0</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
