<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Electrostatic Actuation Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#050a16" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- SOLID CHANNEL GROUND FRAME CROSS SECTION -->
  <rect x="100" y="450" width="600" height="40" fill="#111827" stroke="#334155" stroke-width="2" />
  
  <!-- VAPOR-DEPOSITED GOLD CONTROL PAD LAYER (1500 Angstroms) -->
  <rect x="150" y="440" width="500" height="10" fill="#d97706" stroke="#f59e0b" stroke-width="1" />
  
  <!-- MICRO-THIN FLUOROPOLYMER CYTOP INSULATION COATING (1.2 Microns) -->
  <rect x="150" y="432" width="500" height="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" />

  <!-- DROPLET STATE 1: ZERO-VOLTAGE STATIC EQUILIBRIUM (V = 0.0V) -->
  <!-- Highly Hydrophobic Spherical Contact Angle Boundary (140.0 Degrees) -->
  <g opacity="0.75">
    <path d="M 200,432 A 60,60 0 1,1 300,432 Z" fill="#4b5563" stroke="#9ca3af" stroke-width="2.5" />
    <text x="250" y="320" fill="#9ca3af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">STATIC STATE (0.0V)</text>
    <text x="250" y="335" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">Contact Angle θ: 140°</text>
    <!-- Geometric Contact Line Wedge -->
    <path d="M 180,432 L 220,410" stroke="#ef4444" stroke-width="1.5" />
  </g>

  <!-- DROPLET STATE 2: ACTIVE ELECTROHYDRODYNAMIC OVERCLOCK DRIVE (V = 12.0V) -->
  <!-- Highly Hydrophilic Elongated Forward Wetting Profile (72.1 Degrees) -->
  <g opacity="1">
    <path d="M 450,432 C 430,432 450,340 540,340 C 630,340 635,432 610,432 Z" fill="#1e1b4b" stroke="#00f2ff" stroke-width="3" />
    <text x="540" y="290" fill="#00f2ff" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">OVERCLOCK DRIVE (12.0V)</text>
    <text x="540" y="305" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Contact Angle θ: 72.1°</text>
    <!-- Capillaric Forward Pull Vector Arrow -->
    <path d="M 590,390 L 650,390" fill="none" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrow-green)" />
    <!-- Geometric Contact Line Wedge -->
    <path d="M 425,432 L 465,385" stroke="#34d399" stroke-width="2" />
  </g>

  <!-- RE-ALIGNMENT DIAGRAM DATA SHEET LABELS -->
  <text x="400" y="495" fill="#9ca3af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SUBSTRATE GROUND BASE FRAME</text>
  <text x="400" y="448" fill="#f59e0b" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">GOLD ACTUATION PADS (1500 Å)</text>
  <text x="400" y="425" fill="#38bdf8" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CYTOP FLUOROPOLYMER DIELECTRIC INFRASTRUCTURE (1.2μm)</text>
  
  <text x="400" y="125" fill="#00f2ff" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">LIPPMANN-YOUNG ELECTROWETTING ENVELOPE</text>
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Dielectric Insulation Breakdown Target Limit: 18.5V // Pulse Width Reset Window: 1.5ms</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">EGaIn Surface Tension: 0.624 N/m // High-Speed Overclock Transit Velocity Target: 3.593 m/s</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT LIQUID-RESONANCE-v88 // MODULE COMPUTE-ELECTRO ACTUATION v1.0.0</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
  </defs>
</svg>
