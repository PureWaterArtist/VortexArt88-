<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Kinetic Siphoning Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#040a16" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- MICRO-FLUIDIC LOGIC TRACK DEAD-END APPROACH (1.5mm Wide Entry) -->
  <path d="M 50,150 L 250,150 L 350,260 L 350,340 L 250,450 L 50,450" fill="#0f172a" stroke="#475569" stroke-width="3" />
  <text x="140" y="305" fill="#475569" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">LOGIC CHANNEL DEAD-END</text>

  <!-- INCOMING 2400 Hz ACOUSTIC SHOCK WAVE REFLECTIONS -->
  <g fill="none" stroke="#ef4444" opacity="0.6,1" stroke-width="2">
    <path d="M 100,230 Q 150,200 200,230" />
    <path d="M 120,300 Q 170,270 220,300" />
    <path d="M 100,370 Q 150,340 200,370" />
  </g>

  <!-- TAPERING SYMMETRICAL MICRO-VENTURI NOZZLE CHANNEL (1.5mm -> 0.3mm) -->
  <!-- Compresses and accelerates pressure waves into a high-velocity fluidic jet -->
  <path d="M 350,260 L 450,285 L 550,285 L 550,315 L 450,315 L 350,340" fill="#1e1b4b" stroke="#38bdf8" stroke-width="2.5" />
  <path d="M 230,300 L 320,300" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)" />

  <!-- POLYVINYLIDENE FLUORIDE (PVDF) PIEZOELECTRIC RIBBON MATRIX (110 Microns) -->
  <!-- Flexing under dynamic fluid jet impact to generate electrical energy -->
  <g fill="#022c22" stroke="#10b981" stroke-width="2">
    <!-- Curved/Flexed PVDF ribbon sheet placement inside exit throat -->
    <path d="M 550,270 C 580,270 590,290 620,295 L 620,315 C 590,310 580,330 550,330 Z" />
    <!-- Piezoelectric Crystal Stress Deflection Indicator -->
    <path d="M 585,260 Q 615,300 585,340" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,2" />
  </g>

  <!-- RECOVERED ELECTRICAL AUXILIARY CURRENT VECTOR LOOPS -->
  <path d="M 600,295 Q 600,180 400,160" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-green)" />

  <!-- DIAGRAM RE-ALIGNMENT DETAILS & PARAMETER TEXT OVERLAYS -->
  <text x="210" y="135" fill="#475569" font-family="monospace" font-size="11" font-weight="bold">LOGIC CORE TRACK WALL</text>
  <text x="140" y="210" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SHOCK WAVE REFLECTION</text>
  
  <text x="430" y="255" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">MICRO-VENTURI ACCELERATION (5:1 RATIO)</text>
  <text x="640" y="260" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">PVDF RIBBON (110μm)</text>
  
  <text x="400" y="125" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">PIEZOELECTRIC RECOVERY HARVEST: +282.0 mV</text>
  <text x="400" y="145" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">RESONANT KINETIC SIPHONING RATIO η: ≥ 12.0%</text>
  
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Maximum Allowable Shock Wave Load Ceiling: 8960.0 Pa // Venturi Throat Exit Clearance: 0.30mm</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Piezo Voltage Coefficient g31: 0.216 Vm/N // Symmetrical Harvesting Ribbon Count: 16 Elements</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT LIQUID-RESONANCE-v88 // MODULE COMPUTE-KINETIC ACOUSTIC SIPHON v1.0.0</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
