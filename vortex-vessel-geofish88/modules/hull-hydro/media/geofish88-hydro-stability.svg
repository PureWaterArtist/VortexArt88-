<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Hydrodynamics Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#040916" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- RECONSTRUCTED FRESH WATERLINE BASE PLANE -->
  <rect x="0" y="320" width="800" height="280" fill="#021424" opacity="0.4" />
  <line x1="0" y1="320" x2="800" y2="320" stroke="#0284c7" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- HYDRODYNAMIC HULL TRANSVERSE CONFIGURATION PROFILE -->
  <!-- 8.5-foot expanded cross section mapping V-chine tracking lines -->
  <g fill="#0f172a" stroke="#475569" stroke-width="3" stroke-linejoin="round">
    <path d="M 150,220 L 200,320 L 280,340 L 400,360 L 520,340 L 600,320 L 650,220" />
    <!-- Center Keel Mountain Fold Projection Point -->
    <circle cx="400" cy="360" r="5" fill="#ef4444" stroke="none" />
    <!-- Symmetrical Side Tracking Chine Valley Fold Points -->
    <circle cx="280" cy="340" r="5" fill="#38bdf8" stroke="none" />
    <circle cx="520" cy="340" r="5" fill="#38bdf8" stroke="none" />
  </g>

  <!-- HYDROSTATIC METACENTRIC PROFILE MARKERS -->
  <!-- Center of Gravity (G) -->
  <circle cx="400" cy="260" r="6" fill="#fb7185" />
  <line x1="400" y1="260" x2="400" y2="380" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- Center of Buoyancy (B) -->
  <circle cx="400" cy="335" r="6" fill="#34d399" />
  <!-- Metacenter Stability Pivot (M) -->
  <circle cx="400" cy="218" r="6" fill="#00f2ff" />

  <!-- FLUID MOMENTUM DIRECTION VECTOR ARROWS -->
  <!-- Under-Hull Trapped Water Column Channels -->
  <path d="M 230,365 Q 280,348 320,360" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-cyan)" />
  <path d="M 570,365 Q 520,348 480,360" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-cyan)" />
  <!-- Right-Upward Buoyant Restoring Force Vector -->
  <path d="M 400,335 L 400,180" fill="none" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrow-green)" />

  <!-- DIMENSION MEASUREMENT DIMENSION OVERLAYS -->
  <!-- Draft Clearance Indicator (T = 5.58 cm) -->
  <line x1="680" y1="320" x2="710" y2="320" stroke="#64748b" stroke-width="1.5" />
  <line x1="680" y1="360" x2="710" y2="360" stroke="#64748b" stroke-width="1.5" />
  <line x1="700" y1="320" x2="700" y2="360" stroke="#00f2ff" stroke-width="1.5" marker-end="url(#arrow-cyan)" marker-start="url(#arrow-cyan)" />
  
  <!-- Freeboard Safety Indicator (F = 25.55 cm) -->
  <line x1="120" y1="220" x2="70" y2="220" stroke="#64748b" stroke-width="1.5" />
  <line x1="120" y1="320" x2="70" y2="320" stroke="#64748b" stroke-width="1.5" />
  <line x1="85" y1="220" x2="85" y2="320" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)" />

  <!-- DIAGRAM DATA LABELS & DATA SHEET TEXT OVERLAYS -->
  <text x="750" y="315" fill="#0284c7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="end">FRESH WATERLINE PLANE</text>
  <text x="715" y="345" fill="#00f2ff" font-family="monospace" font-size="11" font-weight="bold">DRAFT: 5.58 cm</text>
  <text x="65" y="275" fill="#34d399" font-family="monospace" font-size="11" font-weight="bold" text-anchor="end">FREEBOARD: 25.55 cm</text>

  <text x="415" y="222" fill="#00f2ff" font-family="monospace" font-size="10" font-weight="bold">M (METACENTER)</text>
  <text x="415" y="264" fill="#fb7185" font-family="monospace" font-size="10" font-weight="bold">G (CENTER OF GRAVITY)</text>
  <text x="415" y="339" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">B (CENTER OF BUOYANCY)</text>

  <text x="400" y="415" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">METACENTRIC SPECS: GM ≥ +0.42m</text>
  <text x="400" y="430" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SHALLOW TRACKING CHINES LOCKED</text>
  
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Volumetric Displacement: 0.455 m^3 // Absolute Payload Capacity Limit: 295.21 kg</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Parasitic Skin Friction Drag Coefficient Cd: 0.032 // Block Factor: 0.78</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE HULL-HYDRO STABILITY PROFILE v1.0.0</text>

  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2ff" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
  </defs>
</svg>
    
