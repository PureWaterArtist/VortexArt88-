<svg xmlns="http://w3.org" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Specifications Grid Base -->
  <rect width="800" height="400" fill="#010204" />
  <g stroke="#040916" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350" />
    <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400 M 400,0 L 400,400 M 450,0 L 450,400 M 500,0 L 500,400 M 550,0 L 550,400 M 600,0 L 600,400 M 650,0 L 650,400 M 700,0 L 700,400 M 750,0 L 750,400" />
  </g>

  <!-- LEFT ZONE: STOWED CASE FOOTPRINT -->
  <g fill="#0f172a" stroke="#ef4444" stroke-width="2.5">
    <rect x="80" y="140" width="160" height="120" rx="4" />
    <line x1="160" y1="140" x2="160" y2="260" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" />
  </g>
  <text x="160" y="195" fill="#9ca3af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">STOWED CASE</text>
  <text x="160" y="210" fill="#ef4444" font-family="monospace" font-size="10" text-anchor="middle">32" x 24" x 8"</text>

  <!-- CENTRAL TRANSITION STEP DIRECTION FLOW ARROW -->
  <path d="M 290,200 L 370,200" fill="none" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow-gold)" />
  <text x="330" y="185" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">EXPAND</text>

  <!-- RIGHT ZONE: EXPANDED 8.5-FOOT HYDRODYNAMIC FISHING HULL -->
  <g fill="#0f172a" stroke="#818cf8" stroke-width="2.5">
    <path d="M 420,200 L 460,140 L 700,140 L 740,200 L 700,260 L 460,260 Z" />
    <rect x="530" y="160" width="60" height="80" rx="2" fill="#1e1b4b" stroke="#00f2ff" stroke-width="1.5" />
  </g>
  <text x="560" y="195" fill="#00f2ff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">SEAT</text>
  <text x="590" y="285" fill="#818cf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">OPERATIONAL HULL (8.5 FT)</text>

  <!-- TECHNICAL DATA DISPLAY READOUTS -->
  <text x="400" y="340" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">KINEMATIC COMPLIANCE CHECK: SUCCESSFUL SECURE PARITY LOCK</text>
  <text x="400" y="360" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Material System: 4.0mm Copolymer Polypropylene // Live-Hinge Rating: 50,000 Cycles</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="35" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // KINEMATIC CONFIGURATION STEP SCHEMA</text>

  <defs>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
