<svg xmlns="http://w3.org" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Automated Keyframe Animation Grid Base -->
  <rect width="800" height="500" fill="#020306" />
  <g stroke="#050a16" stroke-width="1" opacity="0.5">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" />
    <path d="M 50,0 L 50,500 M 100,0 L 100,500 M 150,0 L 150,500 M 200,0 L 200,500 M 250,0 L 250,500 M 300,0 L 300,500 M 350,0 L 350,500 M 400,0 L 400,500 M 450,0 L 450,500 M 500,0 L 500,500 M 550,0 L 550,500 M 600,0 L 600,500 M 650,0 L 650,500 M 700,0 L 700,500 M 750,0 L 750,500" />
  </g>

  <style>
    /* AUTOMATED TRANSFORMATION KINEMATICS MATRIX */
    @keyframes miura_expansion {
      0%, 15% {
        /* STATE 1: STOWED BRIEFCASE (Hyper-Compact 32" x 24") */
        transform: translate(320px, 190px) scaleX(0.2) scaleY(0.7);
        fill: #1e293b;
        stroke: #64748b;
      }
      45%, 70% {
        /* STATE 2: FULLY EXPANDED HYDRODYNAMIC FISHING HULL (8.5-Foot Extension) */
        transform: translate(200px, 150px) scaleX(1.0) scaleY(1.0);
        fill: #0f172a;
        stroke: #818cf8;
      }
      85%, 100% {
        /* STATE 3: RETRACTING BACK TO STORAGE ALIGNMENT BOUNDS */
        transform: translate(320px, 190px) scaleX(0.2) scaleY(0.7);
        fill: #1e293b;
        stroke: #64748b;
      }
    }

    @keyframes status_text_swap {
      0%, 15% { content: "STATUS: COMPRESSED STOWAGE MODE (32.2\" x 24.1\" x 8.0\")"; color: #ef4444; }
      45%, 70% { content: "STATUS: 100% EXPANDED OPERATIONAL HULL (LENGTH: 8.5 FT)"; color: #10b981; }
      85%, 100% { content: "STATUS: AUTOMATED RE-FOLD STOWAGE CYCLE RUNNING"; color: #fb7185; }
    }

    .animated-hull {
      animation: miura_expansion 6s ease-in-out infinite;
      transform-origin: center;
      stroke-linejoin: round;
      stroke-width: 3;
    }

    .live-status::after {
      display: inline-block;
      animation: status_text_swap 6s step-end infinite;
      content: "";
    }
  </style>

  <!-- THE INTERACTIVE TRANSFORMING GEOMETRY CONTAINER -->
  <!-- This master polygon represents the topological outer perimeter line of the copolymer sheets -->
  <polygon class="animated-hull" points="0,75 50,15 350,15 400,75 350,135 50,135" />

  <!-- DYNAMIC TELEMETRY DISPLAY GRAPHICS OVERLAYS -->
  <g font-family="monospace" font-size="12" font-weight="bold">
    <!-- Live HUD Status Box Tracker -->
    <rect x="180" y="380" width="440" height="40" fill="#090d16" stroke="#334155" stroke-width="1.5" rx="3" />
    <text class="live-status" x="200" y="404" fill="#00f2ff">▶ </text>
    
    <!-- Calibration Metrics Readings -->
    <text x="400" y="450" fill="#64748b" text-anchor="middle" font-size="10">Kinematic Math Simulation Speed: 1.0x // Frame Latency: 0.00ms</text>
    <text x="400" y="465" fill="#64748b" text-anchor="middle" font-size="10">Copolymer Polypropylene Live-Hinge Flex Target Check: PASS (50,000 Cycles Rated)</text>
  </g>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="30" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // KINEMATIC TRANSFORMATION LOOP SIMULATOR</text>
</svg>
