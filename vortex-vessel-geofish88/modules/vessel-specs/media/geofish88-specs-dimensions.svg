<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Sizing Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#030814" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- 1. STOWED BRIEFCASE DIMENSION PROFILE (Sedan Trunk Footprint) -->
  <g transform="translate(60, 200)" opacity="0.85">
    <rect width="160" height="120" fill="#111827" stroke="#475569" stroke-width="2.5" rx="4" />
    <!-- Height Indicator Line -->
    <line x1="-15" y1="0" x2="-15" y2="120" stroke="#00f2ff" stroke-width="1.5" marker-end="url(#arrow-cyan)" marker-start="url(#arrow-cyan)" />
    <!-- Width Indicator Line -->
    <line x1="0" y1="135" x2="160" y2="135" stroke="#00f2ff" stroke-width="1.5" marker-end="url(#arrow-cyan)" marker-start="url(#arrow-cyan)" />
    
    <text x="80" y="55" fill="#9ca3af" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">STOWED BRIEFCASE</text>
    <text x="80" y="75" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">WEIGHT: 13.11 kg</text>
    
    <text x="-25" y="65" fill="#00f2ff" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90 -25 65)">Width: 24.1"</text>
    <text x="80" y="150" fill="#00f2ff" font-family="monospace" font-size="10" text-anchor="middle">Length: 32.2"</text>
    <text x="80" y="-15" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Thickness Stack: 8.0"</text>
  </g>

  <!-- TRANSFORMATION TRANSITION BREAK AXIS -->
  <line x1="280" y1="120" x2="280" y2="460" stroke="#1e293b" stroke-width="2" stroke-dasharray="6,4" />

  <!-- 2. EXPANDED VESSEL OPERATIONAL DIMENSION PROFILE (8.5-Foot Hull) -->
  <g transform="translate(340, 200)" opacity="1">
    <!-- 3D Polypropylene Shape Grid Outlines -->
    <path d="M 0,60 L 50,10 L 320,10 L 380,60 L 320,110 L 50,110 Z" fill="#0f172a" stroke="#818cf8" stroke-width="3" />
    
    <!-- Overall Length Indicator Line -->
    <line x1="0" y1="-25" x2="380" y2="-25" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)" />
    <!-- Beam Width Indicator Line -->
    <line x1="400" y1="10" x2="400" y2="110" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" marker-start="url(#arrow-green)" />

    <text x="190" y="55" fill="#818cf8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">EXPANDED FISHING HULL</text>
    <text x="190" y="70" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Buoyancy Max: 295.21 kg</text>

    <text x="190" y="-35" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">TOTAL LENGTH: 8.5 FEET</text>
    <text x="410" y="65" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold">BEAM: 39.37"</text>
    <text x="190" y="135" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Nominal Side Depth: 12.2" // Draft: 5.58cm</text>
  </g>

  <!-- MASTER SYSTEM SCALE FOOTER LABELS -->
  <text x="400" y="515" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">METROLOGICAL SYSTEM STATUS: PARITY LOCK ACTIVE WITH ZERO DRIFT</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Hull Thickness Constant: 4.0mm HDPE-PP // Live-Hinge Flex Threshold: 50,000 Cycles</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE VESSEL-SPECS DATA MATRIX v1.0.0</text>

  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2ff" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
