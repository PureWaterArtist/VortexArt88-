<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Upgrades Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#040916" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- DEPLOYED WATERCRAFT CENTRAL HULL CORRIDOR -->
  <rect x="250" y="150" width="300" height="320" fill="#0f172a" stroke="#475569" stroke-width="3" rx="4" />
  <text x="400" y="180" fill="#475569" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">MAIN COCKPIT FLOOR</text>

  <!-- MOD 1: SYMMETRICAL STABILIZING OUTRIGGERS (Extensions: 750mm) -->
  <g stroke="#a855f7" stroke-width="2.5" fill="none">
    <!-- Left Wing Spar Frame -->
    <path d="M 250,310 L 100,310 L 80,350 L 130,350 Z" fill="#1e1b4b" />
    <!-- Right Wing Spar Frame -->
    <path d="M 550,310 L 700,310 L 720,350 L 670,350 Z" fill="#1e1b4b" />
  </g>
  <path d="M 175,290 L 105,305" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <path d="M 625,290 L 695,305" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)" />

  <!-- MOD 2: TRANSOM ANCHOR SYSTEM BLOCK (Centerline Alignment) -->
  <rect x="370" y="125" width="60" height="25" fill="#334155" stroke="#10b981" stroke-width="2" rx="2" />
  <!-- Center Keel Anchor Rope Line -->
  <line x1="400" y1="150" x2="400" y2="100" stroke="#10b981" stroke-width="2" stroke-dasharray="4,2" />
  <circle cx="400" cy="95" r="6" fill="#10b981" /> <!-- 3.5 kg Anchor Weight Drop Point -->

  <!-- MOD 3: SOLAR CHARGE BENCH TRACK (60 Watt Film Panel Array) -->
  <rect x="270" y="240" width="260" height="40" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="2" />
  <path d="M 280,245 H 520 M 280,255 H 520 M 280,265 H 520 M 280,275 H 520" stroke="#38bdf8" stroke-width="1" opacity="0.5" />

  <!-- MOD 4: MODULAR BAIT LOCKER AND ROD HOLDER TOWERS -->
  <rect x="340" y="380" width="120" height="60" fill="#1f2937" stroke="#f59e0b" stroke-width="2" rx="3" />
  <!-- Flanking Rocket Launcher Tubes -->
  <line x1="330" y1="410" x2="310" y2="440" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />
  <line x1="470" y1="410" x2="490" y2="440" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />

  <!-- TECHNICAL SYSTEM TEXT STAMPS & RE-ALIGNMENT METRICS -->
  <text x="185" y="280" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">OUTRIGGERS (+750mm)</text>
  <text x="185" y="293" fill="#a855f7" font-family="monospace" font-size="9" text-anchor="middle">STABILITY HEIGHT: GM ≥ +0.88m</text>

  <text x="400" y="80" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">TRANSOM ANCHOR DROP (3.5 kg)</text>
  <text x="400" y="230" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SOLAR BENCH PROFILE (60W)</text>
  
  <text x="400" y="465" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">BAIT LOCKER HOOK (TILT: 45°)</text>

  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Max Accessory Rail Torque Load: 45.0 N-m // T-Bolt Seating Target: 2.5 N-m</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Open-Hardware Safety Protocol: System Compliant with CERN-OHL-S-2.0 Requirements</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE VESSEL-UPGRADES RIGGING MATRIX v1.0.0</text>

  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" />
    </marker>
  </defs>
</svg>
