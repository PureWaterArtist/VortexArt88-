<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Field Procedures Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#050b18" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- CHRONOLOGICAL THREE-PHASE EXPANSION TIMELINE MAP -->

  <!-- STAGE 1: COMPRESSED BRIEFCASE STORAGE (0.01% Expansion Track) -->
  <g transform="translate(40, 180)" opacity="0.85">
    <rect width="140" height="110" fill="#1e293b" stroke="#64748b" stroke-width="2.5" rx="4" />
    <line x1="70" y1="0" x2="70" y2="110" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" />
    <!-- Closed Handle Ring -->
    <rect x="50" y="-15" width="40" height="15" rx="2" fill="none" stroke="#64748b" stroke-width="2" />
    <text x="70" y="60" fill="#9ca3af" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">STOWED CASE</text>
    <text x="70" y="75" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">32" x 24" x 8"</text>
  </g>

  <!-- TRANSITION FORCE VECTOR 1 (Manual Pull Engagement) -->
  <path d="M 200,235 L 290,235" fill="none" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow-gold)" />
  <text x="245" y="220" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">PULL FORCE</text>
  <text x="245" y="250" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">120.0 N</text>

  <!-- STAGE 2: KINEMATIC TRANSFORMATION MATRIX (Simultaneous Fold Articulation) -->
  <g transform="translate(320, 165)" opacity="0.9">
    <!-- Unfolding Diamond Tessellation Mesh Outline -->
    <path d="M 0,55 L 45,15 L 115,15 L 160,55 L 115,95 L 45,95 Z" fill="#0f172a" stroke="#38bdf8" stroke-width="2" />
    <line x1="45" y1="15" x2="115" y2="95" stroke="#ef4444" stroke-width="1.5" />
    <line x1="115" y1="15" x2="45" y2="95" stroke="#ef4444" stroke-width="1.5" />
    <text x="80" y="55" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">EXPANDING</text>
    <text x="80" y="70" fill="#0284c7" font-family="monospace" font-size="9" text-anchor="middle">Miura-Ori Sweep</text>
  </g>

  <!-- TRANSITION FORCE VECTOR 2 (Locking Pin Torque Engagement) -->
  <path d="M 500,235 L 590,235" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="545" y="220" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">LOCK CLAMP</text>
  <text x="545" y="250" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">450.0 N</text>

  <!-- STAGE 3: FULLY LOCKED HYDRODYNAMIC VESSEL OPERATIONAL HULL (100% Expansion Track) -->
  <g transform="translate(620, 190)" opacity="1">
    <path d="M 0,45 L 30,15 L 110,15 L 140,45 L 105,75 L 35,75 Z" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5" />
    <!-- Slide Transverse Seat Insertion Indication -->
    <rect x="50" y="25" width="40" height="40" fill="#312e81" stroke="#00f2ff" stroke-width="1.5" rx="1" />
    <text x="70" y="48" fill="#00f2ff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">SEAT</text>
    <text x="70" y="105" fill="#818cf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ACTIVE HULL</text>
    <text x="70" y="120" fill="#4c1d95" font-family="monospace" font-size="10" text-anchor="middle">Length: 8.5 ft</text>
  </g>

  <!-- POST-MISSION RE-FOLD INWARD RETURN TRAJECTORY PATH -->
  <path d="M 690,340 Q 400,430 110,340" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)" />
  <text x="400" y="415" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">COLLAPSE RE-FOLD TRAJECTORY PATH (FORCE: 80.0 N)</text>

  <!-- TECHNICAL SYSTEM SPECIFICATION TEXT CARD DATA STAMPS -->
  <text x="110" y="320" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Phase 1: Unlatch</text>
  <text x="400" y="295" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Phase 2: 30-Sec Uniform Symmetrical Extrusion</text>
  <text x="690" y="340" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Phase 3: Launch Ready</text>

  <text x="400" y="480" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">SETUP CONSTRAINT CEILING: ≤ 30 SECONDS TOTAL RUNTIME</text>
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Gasket Compression Target: 35% Uniform Squeeze // Thickness: 2.60mm</text>
  <text x="400" y="540" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Accessory T-Bolt Setup Bounds: 2.5 N-m Torque Max // Slider Tracks: 600mm</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE VESSEL-PROCEDURES SEQUENCE MAP v1.0.0</text>

  <defs>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 10 L 10 5 L 0 0 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
      
