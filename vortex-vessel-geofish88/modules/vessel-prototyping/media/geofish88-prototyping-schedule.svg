<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Manufacturing Schedule Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#050a15" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- 4-DAY MANIFEST TIMELINE CHART AXES -->
  <g stroke="#334155" stroke-width="2" stroke-linecap="round">
    <line x1="160" y1="520" x2="760" y2="520" /> <!-- Time Axis -->
    <line x1="160" y1="80" x2="160" y2="520" />   <!-- Phase Axis -->
  </g>

  <!-- Day Markers (Linear Time Staging Track) -->
  <g fill="#475569" font-family="monospace" font-size="11" text-anchor="middle">
    <text x="160" y="540">Start</text>
    <text x="310" y="540">Day 1</text>
    <text x="460" y="540">Day 2</text>
    <text x="610" y="540">Day 3</text>
    <text x="760" y="540">Day 4</text>
  </g>

  <!-- Vertical Phase Separation Guides -->
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3">
    <line x1="310" y1="80" x2="310" y2="520" />
    <line x1="460" y1="80" x2="460" y2="520" />
    <line x1="610" y1="80" x2="610" y2="520" />
  </g>

  <!-- RAPID MANUFACTURING SEQUENCE TIMELINE BLOCKS -->

  <!-- Day 1: CNC Router Scoring Matrix -->
  <g opacity="0.9">
    <text x="140" y="135" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">DAY 1: NEST &amp; CNC</text>
    <rect x="160" y="110" width="150" height="24" fill="#0c4a6e" stroke="#0284c7" stroke-width="1.5" rx="2" />
    <text x="170" y="126" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="bold">V-Groove Routing (14k RPM)</text>
  </g>

  <!-- Day 2: Manual Fastening & Dressing Matrix -->
  <g opacity="0.9">
    <text x="140" y="245" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">DAY 2: LATCH FIT</text>
    <rect x="310" y="220" width="150" height="24" fill="#78350f" stroke="#d97706" stroke-width="1.5" rx="2" />
    <text x="320" y="236" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">Marine Latch Pop Riveting</text>
  </g>

  <!-- Day 3: Sealing & Rail Fusion Matrix -->
  <g opacity="0.9">
    <text x="140" y="355" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">DAY 3: COMPRESSION</text>
    <rect x="460" y="330" width="150" height="24" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5" rx="2" />
    <text x="470" y="346" fill="#c084fc" font-family="monospace" font-size="10" font-weight="bold">EPDM Gasket &amp; Rail Weld</text>
    <!-- Vacuum Decay Integrity System Audit Check Gate -->
    <circle cx="610" cy="342" r="6" fill="#ef4444" />
  </g>

  <!-- Day 4: Hydrostatic Validation Matrix -->
  <g opacity="0.9">
    <text x="140" y="465" fill="#10b981" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">DAY 4: VALIDATION</text>
    <rect x="610" y="440" width="150" height="24" fill="#064e3b" stroke="#10b981" stroke-width="1.5" rx="2" />
    <text x="620" y="456" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">Tank Test &amp; Draft Trim</text>
    <!-- COMPLETED HARDSHELL PLATFORM SIGN OFF GATE -->
    <polygon points="760,440 768,452 760,464 752,452" fill="#00f2ff" stroke="#0284c7" stroke-width="1.5" />
  </g>

  <!-- CRITICAL PATH TRANSFER CONNECTION ARROWS -->
  <g fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-grey)">
    <path d="M 310,134 L 310,212" />
    <path d="M 460,244 L 460,322" />
    <path d="M 610,354 L 610,432" />
  </g>

  <!-- PRODUCTION METRIC TEXT OVERLAYS -->
  <text x="235" y="160" fill="#38bdf8" font-family="monospace" font-size="10" text-anchor="middle">Score Depth: 2.2mm</text>
  <text x="385" y="270" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle">Fasteners: 3.8 N-m</text>
  <text x="535" y="380" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">Squeeze rate: 35%</text>
  <text x="685" y="490" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Draft target: 5.58cm</text>

  <!-- GATE SECURITY SIGNPOST LABELS -->
  <text x="625" y="336" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">GATE 1: VACUUM LOCK (-20.0 kPa)</text>
  <text x="760" y="430" fill="#00f2ff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">VESSEL READY</text>

  <!-- Frame Title Header Stamp -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE VESSEL-PROTOTYPING RUN SCHEDULE v1.0.0</text>

  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
</svg>
    
