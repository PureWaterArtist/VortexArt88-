<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Flat Sheet Scoring Grid Base -->
  <rect width="800" height="600" fill="#010306" />
  <g stroke="#081022" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- FLAT COPOLYMER POLYPROPYLENE MATERIAL STOCK FRAME -->
  <!-- 2850mm x 1250mm scaled boundary card -->
  <rect x="100" y="100" width="600" height="400" fill="none" stroke="#475569" stroke-width="3" rx="4" />
  <text x="110" y="125" fill="#475569" font-family="monospace" font-size="11" font-weight="bold">POLYMER STOCK: 2850mm x 1250mm</text>

  <!-- NON-EUCLIDEAN MIURA-ORI CREASE GRID TOOL PATH LINES -->
  
  <!-- Central Keel Line (Continuous Mountain Fold) -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />
  
  <!-- Longitudinal Side Chines (Symmetrical Mountain Folds) -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#ef4444" stroke-width="2" />
  <line x1="100" y1="400" x2="700" y2="400" stroke="#ef4444" stroke-width="2" />

  <!-- Lateral Sector Divisions (Angled Zig-Zag Valley Folds) -->
  <g fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round">
    <!-- Segment Row 1 (Bow Nodes) -->
    <path d="M 200,100 L 250,200 L 200,300 L 250,400 L 200,500" />
    <!-- Segment Row 2 (Midship Cockpit) -->
    <path d="M 320,100 L 370,200 L 320,300 L 370,400 L 320,500" />
    <!-- Segment Row 3 (Midship Utility Track) -->
    <path d="M 440,100 L 490,200 L 440,300 L 490,400 L 440,500" />
    <!-- Segment Row 4 (Stern Transom) -->
    <path d="M 560,100 L 610,200 L 560,300 L 610,400 L 560,500" />
  </g>

  <!-- Node Coordinate Marker Intersections (Verification Points) -->
  <g fill="#00f2ff">
    <circle cx="250" cy="200" r="5" /> <!-- Node A1 -->
    <circle cx="200" cy="300" r="5" /> <!-- Node A2 -->
    <circle cx="370" cy="200" r="5" /> <!-- Node B1 -->
    <circle cx="320" cy="300" r="5" /> <!-- Node B2 -->
    <circle cx="610" cy="200" r="5" /> <!-- Node C1 -->
    <circle cx="560" cy="300" r="5" /> <!-- Node C2 -->
  </g>

  <!-- DIAGRAM LEGEND & CREASE MATRIX SCHEMAS -->
  <rect x="120" y="440" width="180" height="45" fill="#020617" stroke="#334155" stroke-width="1.5" rx="3" />
  <g font-family="monospace" font-size="10" font-weight="bold">
    <line x1="130" y1="452" x2="160" y2="452" stroke="#ef4444" stroke-width="2.5" />
    <text x="170" y="456" fill="#ef4444">MOUNTAIN FOLD (OUTWARD)</text>
    
    <line x1="130" y1="468" x2="160" y2="468" stroke="#38bdf8" stroke-width="2.5" />
    <text x="170" y="472" fill="#38bdf8">VALLEY FOLD (INWARD)</text>
  </g>

  <!-- ANGLE TARGET MARKS TEXT LABELS -->
  <text x="265" y="195" fill="#00f2ff" font-family="monospace" font-size="9">Node_A1 (475, 312.5)</text>
  <text x="175" y="315" fill="#00f2ff" font-family="monospace" font-size="9" text-anchor="end">Node_A2 (475, 625)</text>
  <text x="385" y="195" fill="#00f2ff" font-family="monospace" font-size="9">Node_B1 (950, 312.5)</text>
  <text x="625" y="195" fill="#00f2ff" font-family="monospace" font-size="9">Node_C1 (2375, 312.5)</text>

  <text x="345" y="345" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">α = 45.0°</text>
  <text x="465" y="345" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">β = 67.5°</text>

  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">CNC Router Depth Setting: 2.2mm // Hinge Web: 1.8mm</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE HULL-ORIGAMI PATTERN BLUEPRINT v1.0.0</text>
</svg>
    
