<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Latch Kinematics Grid Base -->
  <rect width="800" height="600" fill="#010305" />
  <g stroke="#060c18" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- MATING HULL HINGE PERIMETER PANELS -->
  <!-- Left Panel Structural Boundary -->
  <path d="M 100,150 L 360,150 L 360,450 L 100,450" fill="#111827" stroke="#374151" stroke-width="2" />
  <!-- Right Panel Structural Boundary -->
  <path d="M 440,150 L 700,150 L 700,450 L 440,450" fill="#111827" stroke="#374151" stroke-width="2" />

  <!-- CO-EXTRUDED COMPRESSION SEAL SECTION (35% Gasket Compression Ratio) -->
  <g fill="none">
    <!-- Uncompressed Boundary D-Profile Phantom Outlines -->
    <path d="M 360,250 A 20,20 0 0,1 400,270 L 400,330 A 20,20 0 0,1 360,350" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,3" />
    <!-- 35% Compressed EPDM Bulb Solid Section (Nominal thickness: 2.60mm) -->
    <path d="M 360,260 Q 390,270 412,280 L 412,320 Q 390,330 360,340 Z" fill="#1f2937" stroke="#38bdf8" stroke-width="3" />
    <path d="M 440,260 Q 410,270 412,280 L 412,320 Q 410,330 440,340 Z" fill="#1f2937" stroke="#38bdf8" stroke-width="3" />
  </g>

  <!-- OVER-CENTER TOGGLE LATCH MECHANISM MECHANICS (Marine 316 Stainless Steel) -->
  <!-- Base Anchor Bracket Left -->
  <rect x="180" y="285" width="60" height="30" fill="#374151" stroke="#9ca3af" stroke-width="1.5" rx="2" />
  <circle cx="195" cy="300" r="3" fill="#111827" />
  <circle cx="225" cy="300" r="3" fill="#111827" />

  <!-- Catch Strike Bracket Right -->
  <rect x="540" y="285" width="40" height="30" fill="#374151" stroke="#9ca3af" stroke-width="1.5" rx="2" />
  <circle cx="560" cy="300" r="3" fill="#111827" />

  <!-- Latch Draw Hook Linkage (Generating 450.0 N Vector Load) -->
  <g stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round">
    <!-- Pivot Base Point -->
    <circle cx="240" cy="300" r="4" fill="#d97706" />
    <!-- Main Handle Toggle Leverage Arm -->
    <line x1="240" y1="300" x2="350" y2="270" />
    <!-- Over-Center Lever Joint -->
    <circle cx="350" cy="270" r="4" fill="#d97706" />
    <!-- Tension Loop Draw Wire Catching Strike Lip -->
    <path d="M 350,270 L 550,300 A 8,8 0 0,0 550,285 L 350,270" fill="none" />
  </g>
  
  <!-- Mechanical Force Vector Arrow Overlay -->
  <path d="M 490,260 L 410,275 L 490,290" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-gold)" />
  <path d="M 310,340 L 390,325 L 310,310" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-gold)" />

  <!-- DIAGRAM TECHNICAL DATA LABELS -->
  <text x="210" y="270" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">316L MOUNT BASE</text>
  <text x="560" y="270" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle">STRIKE HOOK</text>
  
  <text x="450" y="235" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">DRAW TENSION FORCE: 450.0 N</text>
  <text x="412" y="375" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">COMPRESSED BULB: 2.60mm (35% CR)</text>
  
  <text x="120" y="180" fill="#4b5563" font-family="monospace" font-size="11" font-weight="bold">HULL SKIN PANEL 1</text>
  <text x="680" y="180" fill="#4b5563" font-family="monospace" font-size="11" font-weight="bold" text-anchor="end">HULL SKIN PANEL 2</text>
  
  <text x="400" y="515" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Vacuum Decay Constraint: -20.0 kPa Δt_5min ≤ 0.05 kPa</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE HULL-LOCKING KINEMATICS v1.0.0</text>

  <defs>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
  
