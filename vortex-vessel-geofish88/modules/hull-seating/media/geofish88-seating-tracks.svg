<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Internal Structure Grid Base -->
  <rect width="800" height="600" fill="#010304" />
  <g stroke="#050a16" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- TRANSVERSE SECTION OF DEPLOYED POLYPROPYLENE HULL -->
  <!-- Left Outer Wall Profile -->
  <path d="M 120,150 L 160,460 L 400,490" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" />
  <!-- Right Outer Wall Profile -->
  <path d="M 680,150 L 640,460 L 400,490" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" />

  <!-- CO-EXTRUDED UNIVERSAL 1/2-INCH T-SLOT UTILITY GEAR TRACKS -->
  <g fill="#1e293b" stroke="#64748b" stroke-width="1.5">
    <!-- Left Gunwale Flange Track -->
    <rect x="100" y="150" width="50" height="20" rx="1" />
    <path d="M 115,150 L 115,160 L 135,160 L 135,150" fill="none" stroke="#00f2ff" stroke-width="2" />
    <!-- Right Gunwale Flange Track -->
    <rect x="650" y="150" width="50" height="20" rx="1" />
    <path d="M 665,150 L 665,160 L 685,160 L 685,150" fill="none" stroke="#00f2ff" stroke-width="2" />
  </g>

  <!-- INTERLOCKING NYLON 66 SLIDE CHANNELS (Welded Wall Framework) -->
  <g fill="#111827" stroke="#475569" stroke-width="2">
    <rect x="150" y="240" width="20" height="200" rx="2" />
    <rect x="630" y="240" width="20" height="200" rx="2" />
  </g>

  <!-- PRE-MOLDED HDPE STRUCTURAL BULKHEAD SEAT (Bracing Against Inward Flex) -->
  <g fill="#1e1b4b" stroke="#818cf8" stroke-width="3" stroke-linejoin="round">
    <!-- Main Seat Body Contour Cross-Brace -->
    <path d="M 160,250 L 640,250 L 625,430 L 175,430 Z" />
    <!-- Top Ergonomic Seating Surface Bench -->
    <rect x="140" y="225" width="520" height="25" rx="3" fill="#312e81" />
  </g>

  <!-- SPRING-LOADED DETENT LOCKING MECHANICAL TABS -->
  <g fill="#10b981" stroke="#059669" stroke-width="1.5">
    <circle cx="160" cy="410" r="6" />
    <circle cx="640" cy="410" r="6" />
    <path d="M 140,410 L 154,410" stroke-width="2.5" />
    <path d="M 660,410 L 646,410" stroke-width="2.5" />
  </g>

  <!-- DIRECT STRUCTURAL FORCE LOAD VECTOR VECTORS -->
  <!-- Passenger Static Weight Vector (225.0 kg Maximum Ceiling) -->
  <path d="M 400,140 L 400,210" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" />
  <!-- Transverse Wall Expansion Bracing Forces -->
  <path d="M 250,340 L 170,340" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" />
  <path d="M 550,340 L 630,340" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" />

  <!-- TECHNICAL DATA DISPLAY OVERLAYS -->
  <text x="400" y="125" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">MAX VERTICAL LOAD: 225.0 kg</text>
  <text x="400" y="335" fill="#818cf8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">HDPE STRUCTURAL BULKHEAD</text>
  <text x="400" y="350" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">TRANSVERSE BRACING LOCK ACTIVE</text>
  
  <text x="75" y="140" fill="#00f2ff" font-family="monospace" font-size="10">ALUMINUM T-SLOT RAILS</text>
  <text x="400" y="475" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">Detent Tab Engagement: Dual Spring Polymeric Locks</text>
  <text x="400" y="525" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Max Dynamic Gear Track Torque Limit: 45.0 N-m // T-Bolt Set: 2.5 N-m</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT GEO-FISH-v88 // MODULE HULL-SEATING COUNTER-BRACE v1.0.0</text>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
