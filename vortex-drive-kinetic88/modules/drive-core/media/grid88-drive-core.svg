<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Propulsion Core Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#050a15" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- VEHICLE FRONT VENTURI RAM INTAKE NOSE (5:1 Volumetric Ratio) -->
  <g fill="#0c4a6e" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round">
    <path d="M 40,150 L 180,240 L 180,360 L 40,450 Z" />
    <path d="M 40,220 L 180,270" />
    <path d="M 40,380 L 180,330" />
  </g>

  <!-- CENTRAL MIXING MANIFOLD TRACKS (Compressed Jet Lines) -->
  <g fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.85">
    <path d="M 180,270 C 240,270 280,250 320,220" marker-end="url(#arrow-cyan)" />
    <path d="M 180,330 C 240,330 280,350 320,380" marker-end="url(#arrow-cyan)" />
  </g>

  <!-- 1.618 GOLDEN RATIO LOGARITHMIC SPIRAL HORN HUB ASSEMBLY -->
  <!-- External high-purity quartz containment housing -->
  <circle cx="540" cy="300" r="140" fill="#0f172a" stroke="#475569" stroke-width="6" />
  <circle cx="540" cy="300" r="100" fill="#010204" stroke="#475569" stroke-width="4" />

  <!-- CENTRIPETAL IMPLOSION VORTEX CORE (Frictionless Fluid Rope) -->
  <!-- Fluid is compressed tightly down the center line of the channel away from walls -->
  <path d="M 400,300 A 140,140 0 1,0 680,300 A 140,140 0 0,0 423,230 A 100,100 0 0,0 640,300 A 80,80 0 0,0 460,300 A 60,60 0 0,0 580,300 A 40,40 0 0,0 500,300" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  <path d="M 400,300 A 140,140 0 1,0 680,300 A 140,140 0 0,0 423,230 A 100,100 0 0,0 640,300 A 80,80 0 0,0 460,300 A 60,60 0 0,0 580,300 A 40,40 0 0,0 500,300" fill="none" stroke="#f0fdfa" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,4" />

  <!-- ATOMIC LAYER CVD GRAPHENE INTERNAL LINING MATRIX -->
  <!-- Blue non-wetting perimeter ring barrier protecting the quartz track walls -->
  <circle cx="540" cy="300" r="137" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5" />
  <circle cx="540" cy="300" r="103" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5" />

  <!-- FLASH-THERMAL INITIATION & ANTI-FREEZE TRANSDUCER NODES -->
  <!-- Platinum-Titanium grids and 2400 Hz acoustic vibration boundaries -->
  <g fill="#be123c" stroke="#f43f5e" stroke-width="2">
    <rect x="392" y="285" width="16" height="30" rx="2" />
    <circle cx="540" cy="160" r="8" fill="#a855f7" stroke="#c084fc" />
    <circle cx="540" cy="440" r="8" fill="#a855f7" stroke="#c084fc" />
  </g>

  <!-- DATA FIELD READOUT OVERLAYS -->
  <text x="110" y="125" fill="#0284c7" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">VENTURI RAM PORTS (5:1 RATIO)</text>
  <text x="250" y="225" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">COMPRESSED AIR JETS</text>
  
  <text x="540" y="265" fill="#0ea5e9" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">CENTRIPETAL PROPULSION</text>
  <text x="540" y="285" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">CVD GRAPHENE SUPER-SLIP</text>
  <text x="540" y="305" fill="#34d399" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">CRUISE: 2,452.57 RPM</text>
  <text x="540" y="325" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Fluid: Pure Liquid H2O</text>

  <text x="365" y="280" fill="#f43f5e" font-family="monospace" font-size="10" font-weight="bold" text-anchor="end">FLASH-EXPANSION GRID</text>
  <text x="365" y="295" fill="#64748b" font-family="monospace" font-size="9" text-anchor="end">Pulse: 5000V @ ≤5mA</text>
  
  <text x="560" y="155" fill="#a855f7" font-family="monospace" font-size="10" font-weight="bold">2400 Hz ANTI-FREEZE</text>
  <text x="560" y="170" fill="#64748b" font-family="monospace" font-size="9">Shear Shield: Active to -40C</text>

  <text x="400" y="525" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">ISOTHERMAL VORTEX GEOMETRY // CAVITATION EROSION PRESSURE EQUALIZED</text>
  <text x="400" y="555" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">1.618 Golden Ratio Logarithmic Spiral Horn // Logic Track Dimensions: 2.2mm x 2.2mm</text>
  <text x="400" y="575" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT AETHERIS // MODULE DRIVE-CORE PROPULSION藍 INTERLINK v2.0.0</text>

  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
    
