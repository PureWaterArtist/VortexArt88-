  <line x1="335" y1="120" x2="200" y2="120" stroke="#475569" stroke-width="1" />
  <text x="190" y="115" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">FARADAY CRANIAL CAGE [suit-head] // SHELL depth: 8.0mm</text>

