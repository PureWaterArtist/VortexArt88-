    <path d="M 345,245 L 345,232" stroke="#00f2ff" stroke-width="2.5" /> <!-- Micro-Venturi Slit -->
    <circle cx="455" cy="260" r="15" fill="#020617" stroke="#0284c7" stroke-width="2" />
    <path d="M 455,245 L 455,232" stroke="#00f2ff" stroke-width="2.5" />
  </g>

  <!-- SOLID-STATE FLUID COMPRESSION COMPUTER WELL ( suit-sensors & suit-ai ) -->
  <rect x="360" y="285" width="80" height="95" fill="#075985" stroke="#0369a1" stroke-width="2" rx="4" opacity="0.85" />
  <!-- Doppler Acoustic Radar Collector Wavefronts -->
  <path d="M 338,295 C 348,300 348,312 358,305" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  <path d="M 462,295 C 452,300 445,312 442,305" fill="none" stroke="#38bdf8" stroke-width="1.5" />

