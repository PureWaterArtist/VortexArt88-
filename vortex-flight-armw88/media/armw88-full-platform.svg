    <path d="M 495,885 Q 555,900 445,930 L 395,930 Q 345,900 445,885" fill="none" stroke="#e11d48" stroke-width="3.5" />
    <!-- Hip Quick-Release Detent Pin Alignment Bore (14mm) -->
    <circle cx="485" cy="590" r="5" fill="#ef4444" />
  </g>

  <!-- CONTINUOUS DEFENSIVE AND HARVESTING VECTOR CIRCUITS -->
  
  <!-- Continuous Head-to-Toe Faraday Shield Grounding Loop Track -->
  <path d="M 400,45 Q 240,140 195,350 T 210,525 T 325,710 T 325,930" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-cyan)" opacity="0.85" />
  <path d="M 400,45 Q 560,140 605,350 T 590,525 T 475,710 T 475,930" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-cyan)" opacity="0.85" />

  <!-- Triboelectric External Surface Wind Friction Mesh (FEP Harvester Zones) -->
  <path d="M 180,410 L 180,515" stroke="#eab308" stroke-width="2.5" stroke-dasharray="2,2" />
  <path d="M 620,410 L 620,515" stroke="#eab308" stroke-width="2.5" stroke-dasharray="2,2" />

