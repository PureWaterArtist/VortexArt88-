  <line x1="190" y1="445" x2="100" y2="445" stroke="#475569" stroke-width="1" />
  <text x="90" y="449" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">FOREARM LINEAR GUIDE TRACKS // GROOVE WIDTH: 14.0mm</text>

  <line x1="295" y1="405" x2="180" y2="405" stroke="#475569" stroke-width="1" />
  <text x="170" y="409" fill="#9ca3af" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">CHEST INTERLOCK RETAINING BARS // Ø 16.0mm</text>

  <line x1="315" y1="590" x2="190" y2="615" stroke="#475569" stroke-width="1" />
  <text x="180" y="620" fill="#ef4444" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">HIP SEAM QUICK-RELEASE ANCHOR // Ø 14.0mm</text>

  <line x1="275" y1="905" x2="140" y2="905" stroke="#475569" stroke-width="1" />
  <text x="130" y="900" fill="#e11d48" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">KANGAROO SURVIVAL GEAR LEAF LOOPS // RATE: 125,000 N/m</text>

  <line x1="770" y1="310" x2="650" y2="210" stroke="#475569" stroke-width="1" />
  <text x="660" y="205" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">ALBATROSS HIGH-ASPECT RESO-SPARS // 3K filament MATRIX</text>

  <line x1="795" y1="315" x2="685" y2="145" stroke="#475569" stroke-width="1" />
      
