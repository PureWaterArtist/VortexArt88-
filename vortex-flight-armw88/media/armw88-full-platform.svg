    <rect x="188" y="435" width="16" height="22" fill="#f8fafc" stroke="#0284c7" stroke-width="1.5" /> <!-- PTFE Wing Slider Block Carrier -->
    <!-- Hardened Steel Shoulder Connection Pin (16mm) -->
    <circle cx="290" cy="280" r="5.5" fill="#ef4444" />
  </g>
  <!-- Right Arm Assembly Core -->
  <g opacity="0.9">
    <path d="M 515,265 L 575,265 L 595,385 L 615,525 L 575,525 L 555,385 L 515,325 Z" fill="none" stroke="#4b5563" stroke-width="4" />
