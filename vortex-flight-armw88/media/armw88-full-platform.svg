    <rect x="596" y="435" width="16" height="22" fill="#f8fafc" stroke="#0284c7" stroke-width="1.5" />
    <!-- Hardened Steel Shoulder Connection Pin (16mm) -->
    <circle cx="510" cy="280" r="5.5" fill="#ef4444" />
  </g>

