    <line x1="400" y1="405" x2="400" y2="382" stroke="#9ca3af" stroke-width="3.5" stroke-linecap="round" />
    <line x1="374" y1="405" x2="295" y2="405" stroke="#9ca3af" stroke-width="4.5" />
    <line x1="426" y1="405" x2="505" y2="405" stroke="#9ca3af" stroke-width="4.5" />
