<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Prototyping Chart Grid Base -->
  <rect width="800" height="600" fill="#020306" />
  <g stroke="#080d19" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- 14-DAY PRODUCTION SCHEDULE CHART AXES -->
  <g stroke="#334155" stroke-width="2" stroke-linecap="round">
    <line x1="160" y1="520" x2="760" y2="520" /> <!-- Time Axis (Days) -->
    <line x1="160" y1="80" x2="160" y2="520" />   <!-- Phase Axis -->
  </g>

  <!-- Day Markers (Linear Time Track Grid) -->
  <g fill="#475569" font-family="monospace" font-size="11" text-anchor="middle">
    <text x="160" y="540">Day 0</text>
    <text x="331" y="540">Day 4</text>
    <text x="502" y="540">Day 8</text>
    <text x="673" y="540">Day 12</text>
    <text x="758" y="540">Day 14</text>
  </g>

  <!-- Vertical Phase Splitting Dotted Guides -->
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3">
    <line x1="374" y1="80" x2="374" y2="520" /> <!-- End of Phase 1 (Day 5) -->
    <line x1="502" y1="80" x2="502" y2="520" /> <!-- End of Phase 2 (Day 8) -->
    <line x1="630" y1="80" x2="630" y2="520" /> <!-- End of Phase 3 (Day 11) -->
  </g>

  <!-- PRODUCTION PHASE TRACK GANTT BLOCKS -->

  <!-- Phase 1: Machine Queue Printing (Days 1-5) -->
  <g opacity="0.9">
    <text x="140" y="135" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">PHASE 1: PRINTING</text>
    <!-- SLA Resin Core Track -->
    <rect x="160" y="110" width="128" height="16" fill="#0c4a6e" stroke="#0284c7" stroke-width="1.5" rx="2" />
    <text x="170" y="122" fill="#38bdf8" font-family="monospace" font-size="9">SLA Logic Core</text>
    <!-- FDM Carbon Shells Track -->
    <rect x="160" y="135" width="214" height="22" fill="#1e293b" stroke="#4b5563" stroke-width="1.5" rx="2" />
    <text x="170" y="149" fill="#9ca3af" font-family="monospace" font-size="10" font-weight="bold">FDM Carbon Fiber Shell Matrix (10 Perimeters)</text>
  </g>

  <!-- Phase 2: Component Post-Processing & QA (Days 6-8) -->
  <g opacity="0.9">
    <text x="140" y="245" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">PHASE 2: POST-PROC</text>
    <!-- Acoustic Tuning and Multimeter Ground Loops -->
    <rect x="374" y="230" width="128" height="26" fill="#78350f" stroke="#d97706" stroke-width="1.5" rx="2" />
    <text x="384" y="246" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">Acoustic Reed/Faraday QA</text>
    <!-- Vacuum Sealing Check -->
    <circle cx="502" cy="243" r="6" fill="#ef4444" /> <!-- CRITICAL MILESTONE GATE -->
  </g>

  <!-- Phase 3: Integration and Hardware Coupling (Days 9-11) -->
  <g opacity="0.9">
    <text x="140" y="355" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">PHASE 3: ASSEMBLY</text>
    <!-- Fluid Charging, Pin Torque & Parachute Canister Pack -->
    <rect x="502" y="340" width="128" height="26" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5" rx="2" />
    <text x="512" y="356" fill="#c084fc" font-family="monospace" font-size="10" font-weight="bold">Fluid Bus/Link Torque</text>
    <!-- Emergency Canopy Jettison Release Check -->
    <circle cx="630" cy="353" r="6" fill="#ef4444" />
  </g>

  <!-- Phase 4: Calibration & Wind Tunnel Auditing (Days 12-14) -->
  <g opacity="0.9">
    <text x="140" y="465" fill="#10b981" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">PHASE 4: VALIDATION</text>
    <!-- Hydrogel Ingestion and Wind Tunnel Lift Calibration Curves -->
    <rect x="630" y="450" width="128" height="26" fill="#064e3b" stroke="#10b981" stroke-width="1.5" rx="2" />
    <text x="640" y="466" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">Wind Tunnel / Camo</text>
    <!-- COMPLETED PROTOTYPE SYSTEM SEALED RELEASE -->
    <polygon points="758,450 766,463 758,476 750,463" fill="#00f2ff" stroke="#0284c7" stroke-width="1.5" />
  </g>

  <!-- CRITICAL PATHWAYS AND TRANSFER MARKS CONNECTIONS -->
  <g fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-grey)">
    <path d="M 374,146 L 374,222" />
    <path d="M 502,243 L 502,332" />
    <path d="M 630,353 L 630,442" />
  </g>

  <!-- Analytical Performance Specifications Text Cards -->
  <text x="260" y="190" fill="#38bdf8" font-family="monospace" font-size="11" text-anchor="middle">SLA resolution: 0.025mm</text>
  <text x="438" y="290" fill="#f59e0b" font-family="monospace" font-size="11" text-anchor="middle">Grounding target: &lt; 12.0 Ω</text>
  <text x="566" y="400" fill="#c084fc" font-family="monospace" font-size="11" text-anchor="middle">EGaIn Pressure: 40 kPa</text>
  <text x="694" y="505" fill="#34d399" font-family="monospace" font-size="11" text-anchor="middle">Stall trigger: 1200 Pa</text>

  <!-- Milestone Flag Labels -->
  <text x="515" y="236" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">GATE 1: VACUUM LOCK</text>
  <text x="643" y="346" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">GATE 2: JETTISON OK</text>
  <text x="758" y="440" fill="#00f2ff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">PROTOTYPE READY</text>

  <!-- Frame Title Header Stamp -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-PROTOTYPING SCHEDULE MAP v1.0.0</text>

  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
      
