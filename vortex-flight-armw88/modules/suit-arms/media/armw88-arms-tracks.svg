<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Technical Grid Base -->
  <rect width="800" height="600" fill="#04050a" />
  <g stroke="#0f111a" stroke-width="1" opacity="0.6">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- LINEAR SLEEVE LONGITUDINAL SECTION DRAWING -->

  <!-- Layer 1: Main CF-PC Rigid Structural Shell (Forearm, Bicep, and Shoulder Tongue) -->
  <!-- Forearm Shell Block -->
  <path d="M 120,320 L 420,320 L 420,400 L 120,400 Z" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" />
  <!-- Bicep Cuff Block -->
  <path d="M 490,290 L 660,290 L 660,430 L 490,430 Z" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" />
  <!-- Graphene Shield Ground Line Traces (Continuous Layer Cage) -->
  <line x1="120" y1="360" x2="660" y2="360" stroke="#00f2ff" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.5" />

  <!-- Layer 2: Pleated Elbow Accordion Bellows Joint Well (TPU 95A Segment) -->
  <path d="M 420,320 L 440,300 L 455,335 L 470,300 L 490,320 L 490,400 L 470,420 L 455,385 L 440,420 L 420,400 Z" fill="#1e293b" stroke="#6366f1" stroke-width="2.5" />

  <!-- Continuous External Linear Sliding Guide Rail Tracks (14.0mm x 10.0mm Groove) -->
  <rect x="140" y="310" width="260" height="10" fill="#020617" stroke="#38bdf8" stroke-width="2" />
  <!-- Moving Wing Joint Slider Block Unit (PTFE/Delrin Carrier) -->
  <rect x="220" y="302" width="50" height="12" fill="#e2e8f0" stroke="#0284c7" stroke-width="1.5" rx="1" />
  
  <!-- Wing Mechanical Slider Motion Deflection Indicators -->
  <path d="M 210,295 L 170,295" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-cyan)" />
  <path d="M 280,295 L 320,295" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-cyan)" />

  <!-- External Triboelectric Fluoropolymer Siphoning Mesh Layer (1.0mm FEP Grid) -->
  <path d="M 120,406 L 420,406" stroke="#f59e0b" stroke-width="3" stroke-dasharray="2,2" />
  <path d="M 490,436 L 660,436" stroke="#f59e0b" stroke-width="3" stroke-dasharray="2,2" />

  <!-- Liquid Metal Conducting Wire Channels (EGaIn Fluid Bus Loops) -->
  <path d="M 420,406 C 440,430 470,430 490,436" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.75" />
  <path d="M 420,314 C 440,290 470,290 490,294" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.75" />

  <!-- Transverse Torso-Mating Shoulder Attachment Connection Bore (16.0mm) -->
  <circle cx="610" cy="360" r="12" fill="#020617" stroke="#ef4444" stroke-width="2.5" />
  <line x1="610" y1="310" x2="610" y2="410" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Wind Shear Kinetic Friction Force Fields (Static Siphon Inductions) -->
  <path d="M 100,450 Q 250,470 400,450" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7" />
  <path d="M 420,455 Q 540,480 660,455" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow-orange)" />

  <!-- Technical Labels and Dimensional Reference Annotations -->
  <line x1="140" y1="310" x2="80" y2="240" stroke="#4b5563" stroke-width="1" />
  <text x="70" y="235" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">LINEAR GUIDE SLIDER RAIL (14.0mm x 10.0mm)</text>

  <line x1="245" y1="302" x2="245" y2="180" stroke="#4b5563" stroke-width="1" />
  <text x="245" y="175" fill="#e2e8f0" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">WING JOINT DELRIN SLIDER CARRIER</text>

  <line x1="455" y1="310" x2="455" y2="120" stroke="#4b5563" stroke-width="1" />
  <text x="455" y="115" fill="#6366f1" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">FLEXIBLE TPU JOINT ACCORDION BELLOWS (3.0mm)</text>

  <line x1="280" y1="406" x2="190" y2="500" stroke="#4b5563" stroke-width="1" />
  <text x="180" y="505" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">TRIBOELECTRIC FEP SHEETING HARVESTER</text>

  <line x1="455" y1="415" x2="455" y2="520" stroke="#4b5563" stroke-width="1" />
  <text x="455" y="535" fill="#fb923c" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">EGaIn CONDUCTIVE FLUID POWER BUS</text>

  <line x1="610" y1="360" x2="710" y2="360" stroke="#4b5563" stroke-width="1" />
  <text x="720" y="364" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">TORSO SOCKET CONNECTION BORE (Ø 16.0mm)</text>

  <text x="660" y="240" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="end">TRIBOELECTRIC SIPHON POTENTIAL</text>
  <text x="660" y="258" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="end">OUTPUT STABLE: 450V STATIC FIELD</text>

  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-ARMS ACTIVE COMPONENT KINETIC MAP v1.0.0</text>

  <!-- Defs Definition Marker Vector Profiles -->
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-cyan-rev" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c" />
    </marker>
  </defs>
</svg>
      
