<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Aerodynamic Chart Grid Base -->
  <rect width="800" height="600" fill="#020407" />
  <g stroke="#081120" stroke-width="1" opacity="0.6">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- LIFT-TO-DRAG POLAR SLOPE GRAPHICS -->
  <!-- Chart Axes -->
  <g stroke="#475569" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="500" x2="750" y2="500" /> <!-- X-Axis: Velocity / Dynamic Pressure -->
    <line x1="100" y1="50" x2="100" y2="500" />  <!-- Y-Axis: Lift Force Vector -->
  </g>

  <!-- Axis Metric Labels -->
  <text x="425" y="540" fill="#475569" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">DYNAMIC PRESSURE HEAD (Pa) / AIRSPEED (km/h)</text>
  <text x="50" y="275" fill="#475569" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold" transform="rotate(-90 50 275)">GENERATED PASSIVE LIFT FORCE (NEWTONS)</text>

  <!-- Axis Tick Coordinates -->
  <g fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">
    <!-- X Ticks -->
    <text x="100" y="515">0 Pa</text>
    <text x="250" y="515">1200 Pa</text>
    <text x="450" y="515">1890 Pa</text>
    <text x="650" y="515">3000 Pa</text>
    <!-- Y Ticks -->
    <text x="80" y="504" text-anchor="end">0 N</text>
    <text x="80" y="380" text-anchor="end">1050 N</text>
    <text x="80" y="200" text-anchor="end">1940 N</text>
    <text x="80" y="70" text-anchor="end">3500 N</text>
  </g>

  <!-- CRITICAL BOUNDARY CONDITION MARKERS -->

  <!-- 1. Critical Stall Threshold Line (1200 Pa / 158 km/h Cutoff) -->
  <line x1="250" y1="500" x2="250" y2="50" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
  <!-- Stall Zone Shading Block -->
  <rect x="100" y="50" width="150" height="450" fill="#ef4444" opacity="0.08" />

  <!-- 2. Optimal Baseline Cruise Line (1890.3 Pa / 200 km/h Calibration Point) -->
  <line x1="450" y1="500" x2="450" y2="50" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,2" opacity="0.7" />

  <!-- AERODYNAMIC PERFORMANCE VECTOR GRAPH CURVES -->

  <!-- Albatross Soaring State Curve (Optimal 27.4 : 1 Glide Slopes) -->
  <path d="M 100,480 Q 250,430 450,200 T 700,60" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
  
  <!-- Tactical Dive Sweep Curve (Low-Drag Swept Configuration) -->
  <path d="M 100,490 Q 250,470 450,380 T 750,250" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.7" />

  <!-- DYNAMIC DATA LINK INTERSECTION DOTS -->
  
  <!-- Pilot Gravity Weight Match Mark (1050 Newtons Threshold) -->
  <line x1="100" y1="380" x2="750" y2="380" stroke="#4b5563" stroke-width="1" stroke-dasharray="2,4" opacity="0.5" />
  <circle cx="340" cy="380" r="5" fill="#e2e8f0" stroke="#374151" stroke-width="1.5" />

  <!-- Target Cruise Intersection Node (1940.3 Newtons Lift Generated) -->
  <circle cx="450" cy="200" r="6" fill="#10b981" stroke="#047857" stroke-width="2" />
  <line x1="100" y1="200" x2="450" y2="200" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2" opacity="0.6" />

  <!-- VISUAL FLUID CONCURRENT VECTOR INDICATORS -->
  <!-- Boundary Layer Airflow Lines Over Upper Airfoil Represented In Graphic -->
  <g fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8">
    <path d="M 450,140 Q 500,110 580,120" marker-end="url(#arrow-cyan)" />
    <path d="M 460,155 Q 505,130 585,138" marker-end="url(#arrow-cyan)" />
    <!-- Disrupted Separated Airflow Behind Stall Boundary (1200 Pa Region) -->
    <path d="M 150,140 Q 180,110 190,130 T 210,110 T 230,140" stroke="#ef4444" opacity="0.6" />
  </g>

  <!-- Technical Callouts & Annotation Text Blocks -->
  <line x1="250" y1="80" x2="160" y2="40" stroke="#475569" stroke-width="1" />
  <text x="150" y="35" fill="#ef4444" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">CRITICAL STALL BOUNDARY (1200 Pa / 158 km/h)</text>
  <text x="150" y="48" fill="#ef4444" font-family="monospace" font-size="10" text-anchor="end">FLUID COMPUTER FAILSAFE CANOPY TRIGGER</text>

  <line x1="450" y1="80" x2="540" y2="40" stroke="#475569" stroke-width="1" />
  <text x="550" y="35" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">OPTIMAL BASELINE CRUISE (1890 Pa / 200 km/h)</text>
  <text x="550" y="48" fill="#10b981" font-family="monospace" font-size="10">AI MONOTONE STABILITY VECTOR TRACK: 240 Hz</text>

  <line x1="580" y1="120" x2="650" y2="160" stroke="#475569" stroke-width="1" />
  <text x="660" y="164" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold">ALBATROSS SOARING GLIDE (27.4 : 1 L/D)</text>

  <line x1="570" y1="315" x2="650" y2="290" stroke="#475569" stroke-width="1" />
  <text x="660" y="294" fill="#818cf8" font-family="monospace" font-size="12" font-weight="bold">TACTICAL DIVE SWEEP POLAR (15.0 : 1 L/D)</text>

  <line x1="340" y1="380" x2="340" y2="440" stroke="#475569" stroke-width="1" />
  <text x="340" y="455" fill="#e2e8f0" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">PILOT SUSTAINED LEVEL GLIDE BOUNDARY (1050 N)</text>

  <!-- Title & Frame Stamp -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-PERFORMANCE AERODYNAMIC BOUNDARY MAP v1.0.0</text>

  <!-- Defs Marker Arrow Definitions Layout Profiles -->
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
    
