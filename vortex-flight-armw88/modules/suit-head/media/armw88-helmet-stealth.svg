<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Optical Grid Base -->
  <rect width="800" height="600" fill="#05070c" />
  <g stroke="#111827" stroke-width="1" opacity="0.5">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- MULTI-LAYER HELMET TRANSVERSE SECTION PROFILE -->
  
  <!-- Layer 1: Removable Biomimetic Variable-Density Liner (14.0mm Cushion - Inner Zone) -->
  <path d="M 280,240 Q 280,150 400,150 Q 520,150 520,240 L 510,380 C 470,400 330,400 290,380 Z" fill="#14532d" stroke="#22c55e" stroke-width="2" opacity="0.6" />
  
  <!-- Layer 2: Main Structural Carbon-Fiber Polycarbonate Shell (8.0mm Core - Faraday Shield) -->
  <path d="M 260,240 Q 260,130 400,130 Q 540,130 540,240 L 530,400 C 480,420 320,420 270,400 Z" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" />
  <!-- Hexagonal Graphene Shielding Lattice Overlay (Indicating EMP Attenuation Plane) -->
  <path d="M 260,240 Q 260,130 400,130 Q 540,130 540,240" fill="none" stroke="#00f2ff" stroke-width="1" stroke-dasharray="4,6" opacity="0.4" />

  <!-- Layer 3: External Active Chameleon Skin (1.2mm Outer Layer Hydrogel & Nanocrystals) -->
  <path d="M 252,240 Q 252,122 400,122 Q 548,122 548,240 L 537,406 C 485,427 315,427 263,406 Z" fill="none" stroke="#10b981" stroke-width="2.5" />
  <!-- Micro-Groove Mechanochemical Expansion Pockets -->
  <g stroke="#10b981" stroke-width="1" opacity="0.7">
    <line x1="252" y1="240" x2="260" y2="240" />
    <line x1="540" y1="240" x2="548" y2="240" />
    <line x1="400" y1="122" x2="400" y2="130" />
    <line x1="320" y1="140" x2="323" y2="147" />
    <line x1="480" y1="140" x2="477" y2="147" />
    <line x1="280" y1="180" x2="286" y2="185" />
    <line x1="520" y1="180" x2="514" y2="185" />
  </g>

  <!-- Front Viewport & Project ARMO-88 Flat Lens Seating Flange Assembly -->
  <rect x="330" y="210" width="140" height="75" fill="#020617" stroke="#38bdf8" stroke-width="2" rx="2" />
  <!-- Flat Sub-Wavelength Dielectric Metalens Plate Indicator -->
  <line x1="335" y1="247" x2="465" y2="247" stroke="#a855f7" stroke-width="3" />
  <line x1="335" y1="243" x2="465" y2="243" stroke="#059669" stroke-width="1.5" /> <!-- Quantum Upconversion Layer -->

  <!-- Faraday Interlocking Tongue-and-Groove Split Line (Front/Rear Center Matrix) -->
  <line x1="400" y1="120" x2="400" y2="430" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.8" />

  <!-- Transverse Jawline Spring-Loaded Detent Locking Pin Mechanisms (8.0mm) -->
  <g fill="#9ca3af" stroke="#6b7280" stroke-width="1.5">
    <!-- Left Anchor Button Port -->
    <rect x="245" y="380" width="20" height="12" rx="2" />
    <circle cx="255" cy="386" r="3" fill="#ef4444" />
    <!-- Right Anchor Button Port -->
    <rect x="535" y="380" width="20" height="12" rx="2" />
    <circle cx="545" cy="386" r="3" fill="#ef4444" />
  </g>

  <!-- Temporal Logarithmic Acoustic Waveguide Port Cuts -->
  <circle cx="270" cy="280" r="10" fill="#020617" stroke="#38bdf8" stroke-width="1.5" />
  <circle cx="530" cy="280" r="10" fill="#020617" stroke="#38bdf8" stroke-width="1.5" />

  <!-- PHOTONIC CRYPSIS & ELECTRICAL SURGE DISPLACEMENT VECTOR PATHS -->
  
  <!-- High-Voltage EMP Surge Deflection (Harmonic Faraday Ground Plane Pathing) -->
  <path d="M 400,70 Q 200,90 180,240 T 220,480" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)" opacity="0.8" />
  <path d="M 400,70 Q 600,90 620,240 T 580,480" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)" opacity="0.8" />
  
  <!-- Active Background Crypsis Tuning (Mechanochemical Light Shifting Waves) -->
  <!-- Incident Environmental Wavefront (Incoming Light Profile) -->
  <path d="M 120,130 Q 150,160 210,145" fill="none" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3,3" />
  <!-- Filtered / Matched Structural Reflection Output Wavefront -->
  <path d="M 215,120 Q 160,90 110,110" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Metrology Callout Lines and Technical Text Labels -->
  <line x1="256" y1="125" x2="160" y2="70" stroke="#475569" stroke-width="1" />
  <text x="150" y="65" fill="#10b981" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">ACTIVE CHAMELEON CRYSIS SKIN (1.2mm)</text>
  
  <line x1="262" y1="150" x2="160" y2="180" stroke="#475569" stroke-width="1" />
  <text x="150" y="185" fill="#9ca3af" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">CF-PC SHIELDING CELL (8.0mm)</text>

  <line x1="282" y1="210" x2="160" y2="280" stroke="#475569" stroke-width="1" />
  <text x="150" y="285" fill="#22c55e" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">BIOMIMETIC SPONGE LINER (14.0mm)</text>

  <line x1="400" y1="125" x2="400" y2="40" stroke="#475569" stroke-width="1" />
  <text x="400" y="32" fill="#f43f5e" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">FARADAY SEAM SPLIT LINE (GAP &lt; 0.08mm)</text>

  <line x1="400" y1="247" x2="400" y2="340" stroke="#475569" stroke-width="1" />
  <text x="400" y="355" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">PROJECT ARMO-88 VIEWFINDER FLANGE</text>

  <line x1="545" y1="386" x2="650" y2="386" stroke="#475569" stroke-width="1" />
  <text x="660" y="390" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">JAW DETENT LOCK PIN (Ø 8.0mm)</text>

  <text x="100" y="520" fill="#00f2ff" font-family="monospace" font-size="12" font-weight="bold">EMP SURGE DISSIPATION LINE</text>
  <text x="100" y="538" fill="#00f2ff" font-family="monospace" font-size="12" font-weight="bold">TARGET ATTENUATION: 120 dB</text>
  
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-HEAD MULTI-LAYER SPECS MAP v1.0.0</text>

  <!-- Defs Definition Profile for Vector Markers -->
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2ff" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
    
