<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Aerodynamic Grid Base -->
  <rect width="800" height="600" fill="#020408" />
  <g stroke="#090d16" stroke-width="1" opacity="0.6">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- WING ASSEMBLAGE & MECHANICAL JETTISON ARCHITECTURE DIAGRAM -->

  <!-- Layer 1: Central Spine Root Box Assembly (Torso-Mount Connection Zone) -->
  <rect x="310" y="190" width="180" height="220" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" rx="4" />
  <rect x="322" y="202" width="156" height="196" fill="#0b1329" stroke="#00f2ff" stroke-width="1.2" stroke-dasharray="2,3" opacity="0.4" />

  <!-- Multi-Segmented Morphing Hinge Ear Cuffs (Left & Right Joint Links) -->
  <circle cx="200" cy="300" r="22" fill="#030712" stroke="#0284c7" stroke-width="2.5" />
  <circle cx="200" cy="300" r="5" fill="#e2e8f0" stroke="#0284c7" stroke-width="1.5" /> <!-- Hinge Pivot Pin -->
  <circle cx="600" cy="300" r="22" fill="#030712" stroke="#0284c7" stroke-width="2.5" />
  <circle cx="600" cy="300" r="5" fill="#e2e8f0" stroke="#0284c7" stroke-width="1.5" />

  <!-- Primary High-Aspect Ratio Airfoil Spars (Tapered 3K Carbon Framework) -->
  <!-- Left Main Wing Core Profile -->
  <path d="M 178,279 L 20,240 L 40,360 L 178,321 Z" fill="none" stroke="#4b5563" stroke-width="4" opacity="0.85" />
  <!-- Right Main Wing Core Profile -->
  <path d="M 622,279 L 780,240 L 760,360 L 622,321 Z" fill="none" stroke="#4b5563" stroke-width="4" opacity="0.85" />

  <!-- Slotted Eagle-Wingtip Vortex-Shedding Slat Arrays (Passive TPU Feathers) -->
  <!-- Left Slat Sinks -->
  <g fill="none" stroke="#6366f1" stroke-width="2">
    <path d="M 20,240 Q -10,210 -20,250 Q -10,270 24,260" />
    <path d="M 25,275 Q -20,260 -30,295 Q -10,315 28,300" />
    <path d="M 30,310 Q -15,310 -20,345 Q 0,360 35,335" />
  </g>
  <!-- Right Slat Sinks -->
  <g fill="none" stroke="#6366f1" stroke-width="2">
    <path d="M 780,240 Q 810,210 820,250 Q 810,270 776,260" />
    <path d="M 775,275 Q 820,260 830,295 Q 810,315 772,300" />
    <path d="M 770,310 Q 815,310 820,345 Q 800,360 765,335" />
  </g>

  <!-- Internal Liquid Metal EGaIn Power Bus Lines (Continuous Conduit Loops) -->
  <path d="M 322,300 L 178,300 Q 100,290 40,300" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,2" opacity="0.75" />
  <path d="M 478,300 L 622,300 Q 700,290 760,300" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,2" opacity="0.75" />

  <!-- EMERGENCY JETTISON MECHANICAL SHEAR HARDWARE MATRIX -->
  
  <!-- Transverse Safety Locking Slide-Rods (Retracted Vector Paths) -->
  <line x1="210" y1="240" x2="590" y2="240" stroke="#fb7185" stroke-width="5" />
  <line x1="210" y1="360" x2="590" y2="360" stroke="#fb7185" stroke-width="5" />
  <!-- Bowden Tension Release Cable (4mm Inox Line Connection) -->
  <line x1="400" y1="360" x2="400" y2="520" stroke="#ef4444" stroke-width="3.5" />

  <!-- Mechanical Separation & Structural Jettison Vector Blowouts -->
  <g stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.85" marker-end="url(#arrow-red)">
    <path d="M 310,230 L 250,210" />
    <path d="M 310,370 L 250,390" />
    <path d="M 490,230 L 550,210" />
    <path d="M 490,370 L 550,390" />
  </g>
  <path d="M 400,520 L 400,550" fill="none" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red-down)" />

  <!-- Failsafe Canopy Pneumatic Trigger Expansion Lines -->
  <path d="M 400,190 L 400,110" fill="none" stroke="#00f2ff" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)" />
  <g fill="none" stroke="#00f2ff" stroke-width="1.5" opacity="0.8">
    <path d="M 400,110 C 370,90 370,60 400,40" />
    <path d="M 400,110 C 430,90 430,60 400,40" />
  </g>

  <!-- Technical Callouts & Aerodynamic Reference Annotations -->
  <line x1="310" y1="210" x2="180" y2="170" stroke="#4b5563" stroke-width="1" />
  <text x="170" y="165" fill="#9ca3af" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">SPINE ROOT BOX WALL (12.0mm)</text>

  <line x1="200" y1="278" x2="140" y2="120" stroke="#4b5563" stroke-width="1" />
  <text x="140" y="115" fill="#0284c7" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">MORPHING RIB HINGE JOINT (Ø 10.0mm)</text>

  <line x1="90" y1="250" x2="90" y2="60" stroke="#4b5563" stroke-width="1" />
  <text x="90" y="55" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">ALBATROSS HIGH-ASPECT CF-PC SPAR</text>

  <line x1="-10" y1="295" x2="50" y2="210" stroke="#4b5563" stroke-width="1" />
  <text x="60" y="205" fill="#6366f1" font-family="monospace" font-size="12" font-weight="bold">SLOTTED VORTEXTIPS (4 DEFLECTORS)</text>

  <line x1="330" y1="240" x2="220" y2="440" stroke="#4b5563" stroke-width="1" />
  <text x="210" y="445" fill="#fb7185" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">SLOTTED INTERLOCK SHEARPIN INTERFACE</text>

  <line x1="400" y1="470" x2="520" y2="490" stroke="#4b5563" stroke-width="1" />
  <text x="530" y="495" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">BOWDEN SAFETY RELEASE CABLE (Ø 4.0mm)</text>

  <line x1="400" y1="130" x2="520" y2="130" stroke="#4b5563" stroke-width="1" />
  <text x="530" y="134" fill="#00f2ff" font-family="monospace" font-size="12" font-weight="bold">FAILSAFE PNEUMATIC CANOPY TRIGGER</text>

  <text x="680" y="470" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="end">EMERGENCY JETTISON TRIPPED</text>
  <text x="680" y="488" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="end">SHEAR LIMIT REACHED: &lt; 500ms</text>
  <text x="680" y="506" fill="#00f2ff" font-family="monospace" font-size="12" font-weight="bold" text-anchor="end">BACKUP CHUTE IMPULSE: 25.0 m/s</text>

  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-WINGS FLIGHT SURFACE SEPARATION MAP v1.0.0</text>

  <!-- Defs Marker End Vector Definition Sheets Layout -->
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-red-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2ff" />
    </marker>
  </defs>
</svg>
    
