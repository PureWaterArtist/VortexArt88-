<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Kinetic Grid Base -->
  <rect width="800" height="600" fill="#030509" />
  <g stroke="#0e1017" stroke-width="1" opacity="0.6">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- LOWER EXOSKELETON LONGITUDINAL FORCE ROUTING DIAGRAM -->

  <!-- Layer 1: Main CF-PC Rigid Structural Shell (Thigh, Shin, and Hip Tongue) -->
  <!-- Upper Thigh Guard Chassis -->
  <path d="M 280,100 L 460,100 L 440,240 L 300,240 Z" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" />
  <!-- Lower Shin Protection Sleeve -->
  <path d="M 310,290 L 430,290 L 410,480 L 330,480 Z" fill="none" stroke="#4b5563" stroke-width="6" opacity="0.9" />
  <!-- Continuous Graphene Shield Ground Line Traces (EMP Surges Bus) -->
  <line x1="370" y1="100" x2="370" y2="480" stroke="#00f2ff" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.5" />

  <!-- Layer 2: Removable Variable-Density Cushion (18.0mm TPU Internal Liner Profile) -->
  <path d="M 298,110 L 442,110 L 424,230 L 316,230 Z" fill="#115e59" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" />
  <path d="M 326,300 L 414,300 L 396,470 L 344,470 Z" fill="#115e59" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" />

  <!-- Layer 3: External Active Chameleon Skin Micro-Grooves (1.5mm Hydrogel Grid Layout) -->
  <path d="M 274,100 L 466,100" stroke="#10b981" stroke-width="2" />
  <path d="M 304,290 L 436,290" stroke="#10b981" stroke-width="2" />
  <g stroke="#10b981" stroke-width="1" opacity="0.7">
    <line x1="310" y1="330" x2="304" y2="330" />
    <line x1="312" y1="370" x2="306" y2="370" />
    <line x1="314" y1="410" x2="308" y2="410" />
    <line x1="430" y1="330" x2="436" y2="330" />
    <line x1="426" y1="370" x2="432" y2="370" />
    <line x1="422" y1="410" x2="428" y2="410" />
  </g>

  <!-- Kangaroo-Tendon High-Elasticity Carbon-Fiber Leaf-Spring Loops (12.0mm Ribbon Array) -->
  <!-- Heel / Shin Shock Absorber Unloaded Profile (Default State Line) -->
  <path d="M 330,480 Q 230,500 310,540 L 430,540 Q 510,500 410,480" fill="none" stroke="#e11d48" stroke-width="4" />
  
  <!-- High-Velocity Impact Compressed Profile Indicator (150mm Travel Cushion Arc) -->
  <path d="M 330,480 Q 250,515 310,535 L 430,535 Q 490,515 410,480" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="3,3" opacity="0.8" />

  <!-- Touchdown Percussive Force Redirection Vectors (Skeletal Bypasses) -->
  <!-- Upward Kinetic Shock Redirection Fields -->
  <path d="M 370,540 L 370,490" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" />
  <path d="M 310,540 Q 200,440 310,290" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,2" opacity="0.6" />
  <path d="M 430,540 Q 540,440 430,290" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,2" opacity="0.6" />

  <!-- Transverse Torso-Mating Hip Alignment Connector Bore (Ø 14.0mm) -->
  <circle cx="370" cy="140" r="10" fill="#020617" stroke="#fb7185" stroke-width="2.5" />
  <line x1="320" y1="140" x2="420" y2="140" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Lower Boot Latch Interface Collar Plate Anchor Assembly -->
  <rect x="330" y="474" width="80" height="12" fill="#1f2937" stroke="#9ca3af" stroke-width="2" rx="1" />

  <!-- External Triboelectric FEP Surface Mesh Position Indicators -->
  <path d="M 276,120 L 296,220" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="2,2" />
  <path d="M 464,120 L 444,220" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="2,2" />

  <!-- Metrology Callouts & Dynamic Reference Annotations -->
  <line x1="274" y1="100" x2="160" y2="60" stroke="#4b5563" stroke-width="1" />
  <text x="150" y="55" fill="#10b981" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">ACTIVE CHAMELEON CAMOUFLAGE SKIN (1.5mm)</text>

  <line x1="284" y1="140" x2="160" y2="130" stroke="#4b5563" stroke-width="1" />
  <text x="150" y="125" fill="#9ca3af" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">CF-PC SHIELD CHASSIS (10.0mm)</text>

  <line x1="304" y1="190" x2="160" y2="200" stroke="#4b5563" stroke-width="1" />
  <text x="150" y="205" fill="#06b6d4" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">THIGH/SHIN G-CUSHION LINER (18.0mm)</text>

  <line x1="370" y1="140" x2="250" y2="140" stroke="#4b5563" stroke-width="1" />
  <text x="240" y="144" fill="#fb7185" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">HIP JOINT MOUNT BORE (Ø 14.0mm)</text>

  <line x1="250" y1="490" x2="170" y2="440" stroke="#4b5563" stroke-width="1" />
  <text x="160" y="435" fill="#e11d48" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">KANGAROO-TENDON LEAF SPRING (12.0mm)</text>

  <line x1="290" y1="520" x2="190" y2="510" stroke="#4b5563" stroke-width="1" />
  <text x="180" y="505" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="end" font-weight="bold">COMPRESSED TRAVEL ARC (150mm CLEARANCE)</text>

  <text x="540" y="500" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold">FORCE DISSIPATION LOOP</text>
  <text x="540" y="518" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold">SPRING RATE: 125,000 N/m</text>
  <text x="540" y="536" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold">SINK SURVIVAL LIMIT: 4.5 m/s</text>

  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMW-88 // MODULE SUIT-LEGS SURVIVAL LANDER SYSTEM v1.0.0</text>

  <!-- Defs Marker Arrow Vector Profiles Layout -->
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
    
