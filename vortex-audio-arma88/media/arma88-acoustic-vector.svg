<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Acoustic Bench Dark Blue Grid Base -->
  <rect width="800" height="600" fill="#060913" />
  <g stroke="#161e30" stroke-width="1" opacity="0.4">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- In-Ear Ultra-Compact Chassis Profile Boundary -->
  <path d="M 120,180 C 120,120 280,120 320,150 C 360,180 500,200 580,220 L 580,380 C 500,400 360,420 320,450 C 280,480 120,480 120,420 Z" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="4,4" opacity="0.8" />
  
  <!-- Internal SLA Rigid Acoustic Core Engine Blocks -->
  <rect x="220" y="160" width="280" height="280" fill="#0f172a" stroke="#0284c7" stroke-width="2" rx="8" />

  <!-- Logarithmic Cardioid Plenum Main Audio Funnel Intake -->
  <path d="M 120,240 L 220,260 L 220,340 L 120,360 Z" fill="#020617" stroke="#38bdf8" stroke-width="2" />

  <!-- Inner Compression Channels (0.45mm Geometric Taper Tracks) -->
  <g stroke="#00f2ff" stroke-width="2" fill="none">
    <path d="M 220,270 Q 300,240 380,270 T 480,290" />
    <path d="M 220,330 Q 300,360 380,330 T 480,310" />
    <path d="M 220,300 C 280,290 340,310 400,300" stroke-width="1.5" stroke-dasharray="3,3" />
  </g>

  <!-- Parallel Non-Newtonian STF Bypass Valve Loops (1.1mm Tracks) -->
  <path d="M 220,200 L 480,200 A 30,30 0 0,1 480,260 L 420,260" fill="none" stroke="#e11d48" stroke-width="3" opacity="0.7" />
  <path d="M 220,400 L 480,400 A 30,30 0 0,0 480,340 L 420,340" fill="none" stroke="#e11d48" stroke-width="3" opacity="0.7" />
  <circle cx="480" cy="200" r="8" fill="#fb7185" /> <!-- Micro Shear-Thickening Node -->
  <circle cx="480" cy="400" r="8" fill="#fb7185" />

  <!-- Outer Boundary Piezo-Kinetic PVDF Film Mesh Seating Rails -->
  <path d="M 160,150 L 300,135" stroke="#f59e0b" stroke-width="4" stroke-dasharray="5,2" />
  <path d="M 160,450 L 300,465" stroke="#f59e0b" stroke-width="4" stroke-dasharray="5,2" />

  <!-- Acoustic Trajectory Waves Propagation Layers -->
  <!-- Ambient Low-Amplitude Sounds Wavefront Inputs -->
  <g stroke="#e2e8f0" stroke-width="2" fill="none">
    <path d="M 40,260 Q 50,300 40,340" />
    <path d="M 70,250 Q 85,300 70,350" />
    <path d="M 100,240 Q 120,300 100,360" />
  </g>

  <!-- High-Frequency Accelerated Compact Output Vector Projections -->
  <g stroke="#10b981" stroke-width="3.5" fill="none" marker-end="url(#arrow-green)">
    <path d="M 480,295 Q 520,280 580,260" />
    <path d="M 480,300 L 580,300" />
    <path d="M 480,305 Q 520,320 580,340" />
  </g>
  <!-- Amplified Pressure Waves Toward Tympanic Target Plane -->
  <g stroke="#34d399" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M 620,250 A 60,60 0 0,1 620,350" />
    <path d="M 650,260 A 40,40 0 0,1 650,340" />
    <path d="M 680,280 A 20,20 0 0,1 680,320" />
  </g>

  <!-- Alignment Indicator Marks -->
  <line x1="220" y1="40" x2="220" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="480" y1="40" x2="480" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Technical Annotations and Overlays Text -->
  <text x="40" y="220" fill="#e2e8f0" font-family="monospace" font-size="13" font-weight="bold">LOW-AMP INLET INPUT (45.0 dB)</text>
  <text x="350" y="125" fill="#f59e0b" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">KINETIC JAW SIPHON PVDF MESH RAIL</text>
  <text x="170" y="385" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold">LOG-CARDIOID PLENUM</text>
  <text x="350" y="225" fill="#00f2ff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">ACOUSTIC VENTURI CHANNEL (0.45mm WIDTH)</text>
  <text x="350" y="185" fill="#fb7185" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">NON-NEWTONIAN STF BYPASS VALVES (1.1mm)</text>
  <text x="660" y="235" fill="#10b981" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">PASSIVE GAIN EXHAUST (+35 dB)</text>
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMA-88 // ACOUSTIC RESODYNAMIC SPECTRUM MAP v1.0.0</text>

  <!-- Marker End Layout Arrow Definition -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
    
