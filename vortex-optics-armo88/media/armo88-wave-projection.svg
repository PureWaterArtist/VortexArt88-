<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Optical Bench Grid -->
  <rect width="800" height="600" fill="#070a12" />
  <g stroke="#1a2438" stroke-width="1" opacity="0.4">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- Optical Component Layer Blocks -->
  <!-- Layer 1: Sub-Wavelength Silicon Nitride Metalens Matrix -->
  <rect x="240" y="80" width="40" height="440" fill="#1e1b4b" stroke="#4338ca" stroke-width="2" opacity="0.6" />
  <!-- Layer 2: Quantum Dot Upconversion Phosphor Plate -->
  <rect x="340" y="80" width="20" height="440" fill="#064e3b" stroke="#059669" stroke-width="2" opacity="0.6" />
  <!-- Outer Frame Chassis Boundary Indications -->
  <path d="M 210,60 L 400,60 L 400,540 L 210,540 Z" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="6,4" opacity="0.7" />

  <!-- Adaptive Fluidic Focus Coanda Capillary Loops (Upper and Lower Section Mounts) -->
  <rect x="220" y="10" width="80" height="50" fill="#0f172a" stroke="#0284c7" stroke-width="2" />
  <circle cx="260" cy="35" r="14" fill="#64748b" opacity="0.7" /> <!-- EGaIn Liquid Metal Core -->
  <rect x="220" y="540" width="80" height="50" fill="#0f172a" stroke="#0284c7" stroke-width="2" />
  <circle cx="260" cy="565" r="14" fill="#64748b" opacity="0.7" />

  <!-- Wavefront Trajectory Line Projections -->
  <!-- Incoming Invisible Near-Infrared (980nm) Flat Wavefront Planar Vectors -->
  <g stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2">
    <path d="M 40,150 L 240,150" />
    <path d="M 40,200 L 240,200" />
    <path d="M 40,250 L 240,250" />
    <path d="M 40,300 L 240,300" />
    <path d="M 40,350 L 240,350" />
    <path d="M 40,400 L 240,400" />
    <path d="M 40,450 L 240,450" />
  </g>
  <!-- Planar Wavefront Vertical Grids (IR) -->
  <g stroke="#f43f5e" stroke-width="1.5" opacity="0.6">
    <line x1="80" y1="120" x2="80" y2="480" />
    <line x1="140" y1="120" x2="140" y2="480" />
    <line x1="200" y1="120" x2="200" y2="480" />
  </g>

  <!-- Intermediate Phase Shift Modulation Waves (Inside Metalens Node) -->
  <g stroke="#a855f7" stroke-width="2.5" fill="none">
    <path d="M 280,150 Q 310,130 340,150" />
    <path d="M 280,200 Q 310,185 340,200" />
    <path d="M 280,250 Q 310,240 340,250" />
    <path d="M 280,300 Q 310,295 340,300" />
    <path d="M 280,350 Q 310,340 340,350" />
    <path d="M 280,400 Q 310,385 340,400" />
    <path d="M 280,450 Q 310,430 340,450" />
  </g>

  <!-- Post-Upconversion Cascaded Converging Visual Vectors (Visible Green 555nm) -->
  <g stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)">
    <path d="M 360,150 L 680,285" />
    <path d="M 360,200 L 680,290" />
    <path d="M 360,250 L 680,295" />
    <path d="M 360,300 L 680,300" />
    <path d="M 360,350 L 680,305" />
    <path d="M 360,400 L 680,310" />
    <path d="M 360,450 L 680,315" />
  </g>
  <!-- Curved Focused Converging Wavefront Grids (Visible Green) -->
  <g stroke="#34d399" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 440,140 A 300,300 0 0,0 440,460" />
    <path d="M 520,175 A 200,200 0 0,0 520,425" />
    <path d="M 600,220 A 100,100 0 0,0 600,380" />
  </g>

  <!-- Focal Convergence Singularity Target Point (Human Retinal Focus Plane) -->
  <circle cx="690" cy="300" r="16" fill="#10b981" opacity="0.3" />
  <line x1="690" y1="250" x2="690" y2="350" stroke="#10b981" stroke-width="2" />
  <circle cx="690" cy="300" r="4" fill="#34d399" />

  <!-- Metrology Vector Core Labels and Notes -->
  <text x="40" y="115" fill="#ef4444" font-family="monospace" font-size="13" font-weight="bold">INVISIBLE INLET INFRARED (λ₁: 980nm)</text>
  <text x="260" y="525" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">METALENS PHASE DELAY</text>
  <text x="260" y="72" fill="#38bdf8" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">CAPILLARY LOOP FOCUS</text>
  <text x="350" y="525" fill="#10b981" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">QUANTUM UPCONVERSION</text>
  <text x="540" y="135" fill="#10b981" font-family="monospace" font-size="13" font-weight="bold">VISIBLE CONVERGING GREEN (λ₂: 555nm)</text>
  <text x="705" y="275" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold">RETINAL ORIGIN (0,0,0)</text>
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT ARMO-88 // OPTICAL WAVEFRONT RESODYNAMICS LAYOUT Map</text>

  <!-- Marker Arrow Definitions Profile -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
    
