  <path d="M 300,310 H 560" fill="none" stroke="#cbd5e1" stroke-width="24" stroke-linecap="round" />
  <path d="M 300,310 H 560" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.8" />

