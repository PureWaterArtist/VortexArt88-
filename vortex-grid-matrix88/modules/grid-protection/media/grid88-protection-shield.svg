    <rect x="250" y="240" width="20" height="140" rx="1" />
  </g>
  <path d="M 235,220 V 235 M 245,400 V 385" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,1" />

  <!-- BARIUM TITANATE (BaTiO3) PIEZO-CATALYTIC SCALINGS (15 Micron Thin-Films) -->
  <!-- Continuous continuous acoustic sonolysis driven by native 2400 Hz hum -->
  <path d="M 285,230 H 585 M 285,390 H 585" stroke="#10b981" stroke-width="3" stroke-dasharray="4,2" />

