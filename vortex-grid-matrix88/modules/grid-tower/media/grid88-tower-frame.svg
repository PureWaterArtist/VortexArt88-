<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Vertical Tower Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#040a14" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- TRANSVERSE SCHEMATIC SECTIONS OF VERTICAL RESONDING TOWER -->
  <!-- Main Structural Outer Shell Casing (3.5m Scaled Envelope) -->
  <rect x="250" y="80" width="300" height="440" fill="none" stroke="#475569" stroke-width="3" rx="4" />
  <text x="400" y="105" fill="#475569" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SHELL ENVELOPE BASELINE DIAMETER: 3.5m</text>

  <!-- SYMMETRICAL COMPRESSING VENTURI INTAKE PORT INDICATION FINS (5:1 Ratio) -->
  <g fill="#0f172a" stroke="#38bdf8" stroke-width="2">
    <!-- Left Intake Venturi Channel -->
    <path d="M 120,200 L 250,230 L 250,270 L 120,300 Z" />
    <!-- Right Intake Venturi Channel -->
    <path d="M 680,200 L 550,230 L 550,270 L 680,300 Z" />
  </g>

  <!-- CENTRAL DOUBLE-HELICAL VORTEX CAVITY (Quartz Core Track Radius: 0.35m) -->
  <!-- Houses spinning EGaIn liquid metal matrix -->
  <g fill="none" stroke-linecap="round">
    <!-- Winding Core Helix Channels Tracking Grid -->
    <path d="M 400,120 Q 320,180 400,240 Q 480,300 400,360 Q 320,420 400,480" stroke="#cbd5e1" stroke-width="26" />
    <path d="M 400,120 Q 320,180 400,240 Q 480,300 400,360 Q 320,420 400,480" stroke="#f8fafc" stroke-width="4" opacity="0.7" />
  </g>

  <!-- CLOSED-LOOP BOUNDARY HARVESTING RECYCLING EMBEDDED LAYERS -->
  <!-- Micro-thin Seebeck thermopiles and piezoelectric ribbons lining the channels -->
  <g fill="none" stroke="#10b981" stroke-width="1.5">
    <path d="M 382,120 Q 302,180 382,240 Q 462,300 382,360 Q 302,420 382,480" stroke-dasharray="4,2" />
    <path d="M 418,120 Q 338,180 418,240 Q 498,300 418,360 Q 418,420 418,480" stroke-dasharray="4,2" />
  </g>

  <!-- AERODYNAMIC VELOCITY VELOCITY AMPLIFICATION VECTOR ARROWS -->
  <path d="M 140,250 L 230,250" fill="none" stroke="#00f2ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" />
  <path d="M 660,250 L 570,250" fill="none" stroke="#00f2ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" />

  <!-- DYNAMIC STRATOSPHERIC FIELD ACCUMULATION GRIDS -->
  <!-- Vertical Potential Gradient Tracking Lines (+2,450.0V Build Profile) -->
  <g stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4">
    <line x1="280" y1="60" x2="280" y2="540" />
    <line x1="520" y1="60" x2="520" y2="540" />
  </g>
  <path d="M 280,60 V 40" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-gold)" />
  <path d="M 520,60 V 40" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-gold)" />

  <!-- DIAGRAM RE-ALIGNMENT DATA SHEET TEXT OVERLAYS -->
  <text x="110" y="180" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold">VENTURI INTAKE (LEFT)</text>
  <text x="690" y="180" fill="#38bdf8" font-family="monospace" font-size="11" font-weight="bold" text-anchor="end">VENTURI INTAKE (RIGHT)</text>
  
  <text x="400" y="235" fill="#ffffff" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SPINNING EGaIn VORTEX BUS</text>
  <text x="400" y="253" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">ENERGY RECOVERY GRIDS ACTIVE</text>
  
  <text x="220" y="50" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">ION-CAPTURE STATIC LINES</text>
  <text x="400" y="500" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">ION GRADIENT BALANCE POTENTIAL: 2,450.0 V</text>

  <text x="400" y="545" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">Total Structural Height: 24.5m // Aerodynamic Port Compression Profile: 5:1 Taper</text>
  <text x="400" y="560" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Boundary Energy Recovery Siphon Efficiency Floor: η ≥ 8.5% // Quartz Core Helix Radius: 0.35m</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT RESONANT INFRASTRUCTURE // MODULE GRID-TOWER GEOMETRY v1.0.0</text>

  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2ff" />
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
    
