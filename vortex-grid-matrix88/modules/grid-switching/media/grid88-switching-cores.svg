<svg xmlns="http://w3.org" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Cleanroom Dark Bench Fluidic Switching Grid Base -->
  <rect width="800" height="600" fill="#010204" />
  <g stroke="#050b18" stroke-width="1" opacity="0.65">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550" />
    <path d="M 50,0 L 50,600 M 100,0 L 100,600 M 150,0 L 150,600 M 200,0 L 200,600 M 250,0 L 250,600 M 300,0 L 300,600 M 350,0 L 350,600 M 400,0 L 400,600 M 450,0 L 450,600 M 500,0 L 500,600 M 550,0 L 550,600 M 600,0 L 600,600 M 650,0 L 650,600 M 700,0 L 700,600 M 750,0 L 750,600" />
  </g>

  <!-- SOLID COMPUTE CORE NOZZLE PERIMETER (2.2mm Carve Depth) -->
  <path d="M 400,100 L 400,220 L 250,380 L 250,500" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
  <path d="M 400,220 L 550,380 L 550,500" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
  <path d="M 330,100 L 330,180 L 170,340 L 170,500" fill="none" stroke="#475569" stroke-width="3" opacity="0.5" />
  <path d="M 470,100 L 470,180 L 630,340 L 630,500" fill="none" stroke="#475569" stroke-width="3" opacity="0.5" />

  <!-- HOT OVERLOADED INCOMING POWER STREAM SECTOR (Left Boundary Channel) -->
  <!-- Joule heating (I²R) triggers Seebeck-Curie demagnetization -->
  <path d="M 400,100 L 400,220 L 250,380" fill="none" stroke="#7f1d1d" stroke-width="16" stroke-linecap="round" />
  <path d="M 400,100 L 400,220 L 250,380" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" opacity="0.7" />

  <!-- SELF-STEERING AUTONOMOUS DIVERTED FLUID INTERFECE (Right Boundary Track) -->
  <!-- Fluid metal flows into cooler adjacent track via permanent magnetic draw -->
  <path d="M 400,220 L 550,380 L 550,480" fill="none" stroke="#cbd5e1" stroke-width="16" stroke-linecap="round" />
  <path d="M 400,220 L 550,380 L 550,480" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.9" />

  <!-- EMBEDDED NDFEB N52 MAGNETIC DRIVER BLOCKS -->
  <rect x="580" y="360" width="30" height="40" fill="#1e1b4b" stroke="#a855f7" stroke-width="2" rx="2" />
  <text x="595" y="385" fill="#a855f7" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">N52</text>

  <!-- SPLIT INTERACTION ZONE ENERGY HARVESTING LINERS (Seebeck & PVDF) -->
  <!-- 250μm Thermopiles and 110μm Piezo capturing split boundaries friction -->
  <path d="M 390,230 L 330,290" stroke="#34d399" stroke-width="3" fill="none" />
  <path d="M 410,230 L 470,290" stroke="#38bdf8" stroke-width="3" fill="none" />
  <path d="M 330,260 L 410,260" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- AUTONOMOUS REROUTING KINETIC MOTION VECTORS -->
  <path d="M 400,180 L 480,260" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)" />

  <!-- RE-ALIGNMENT DIAGRAM DATA SHEET OVERLAYS TEXT -->
  <text x="400" y="65" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">BISTABLE COANDĂ WALL-ADHESION NOZZLE (θ = 30.0°)</text>
  <text x="210" y="160" fill="#ef4444" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">OVERLOADED SECTOR (HOT: 42°C - 65°C)</text>
  <text x="590" y="160" fill="#cbd5e1" font-family="monospace" font-size="10" font-weight="bold">COOL ADJACENT TRACK (22°C BASELINE)</text>

  <text x="400" y="490" fill="#34d399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">AUTONOMOUS SWITCHING VELOCITY: +3.82 m/s</text>
  <text x="400" y="510" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">FRICTION ENERGY CAPTURE MATRIX RATIO η: ≥ 16.5%</text>

  <text x="400" y="550" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Thermo-Magnetic Curie Reset Loop Window: 1.5ms // Fluid Native Surface Tension: 0.624 N/m</text>
  <text x="400" y="565" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">Seebeck Layer Profiling: 250μm Bismuth-Telluride Thin-Film // Piezoelectric Ribbon Matrix: 110μm PVDF</text>

  <!-- Title & Foot Stamp Frame Matrix -->
  <text x="400" y="585" fill="#475569" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">PROJECT RESONANT INFRASTRUCTURE // MODULE GRID-SWITCHING CURIE NODE v1.0.0</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>
</svg>
